<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEF Gallery</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Segoe UI,sans-serif;background:#f3f4f6;margin:0;}
.header{text-align:center;background:#2563eb;color:white;padding:20px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:20px;max-width:1300px;margin:auto;}
.gallery-item{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.gallery-item img,.gallery-item video{width:100%;height:220px;object-fit:cover;}
.gallery-content{padding:15px;}
</style>
</head>
<body>
<div class="header">
<h1>Shubhi Education Foundation Gallery</h1>
<p>Events, Activities & Updates</p>
</div>
<div id="galleryList" class="gallery-grid"></div>
<script>
const client = supabase.createClient("YOUR_SUPABASE_URL","YOUR_SUPABASE_KEY");
async function loadGallery(){
 const {data}=await client.from('gallery').select('*').order('id',{ascending:false});
 const box=document.getElementById('galleryList');
 box.innerHTML='';
 (data||[]).forEach(g=>{
   box.innerHTML += `<div class="gallery-item">
     ${g.media_type==='video' ? `<video controls src="${g.media_url}"></video>` : `<img src="${g.media_url}">`}
     <div class="gallery-content">
       <h3>${g.title}</h3>
       <p>${g.description||''}</p>
     </div>
   </div>`;
 });
}
loadGallery();
</script>
</body>
</html>
