<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Management - SEF Dahod</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{margin:0;font-family:Segoe UI,sans-serif;background:#f3f4f6;}
    .header{background:#2563eb;color:#fff;text-align:center;padding:18px;}
    .header img{width:65px;}
    nav{background:#1d4ed8;padding:10px;text-align:center;}
    nav a{color:#fff;text-decoration:none;margin:6px;padding:8px 14px;display:inline-block;background:#2563eb;border-radius:6px;}
    .container{max-width:1300px;margin:auto;padding:20px;}
    .card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
    input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px;}
    button{padding:10px 16px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer;}
    button:hover{background:#1d4ed8;}
    .delete-btn{background:#dc2626;}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;}
    .gallery-item{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
    .gallery-item img{width:100%;height:220px;object-fit:cover;}
    .gallery-content{padding:12px;}
    .gallery-content h3{margin:0 0 8px;font-size:18px;}
    .gallery-content p{font-size:14px;color:#444;}
    @media(max-width:768px){.gallery-item img{height:180px;}}
  </style>
</head>
<body>

<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","gallery-admin.html");
  location.href="login.html";
}
</script>

<div class="header">
  <img src="logo.png" alt="Logo">
  <h2>Shubhi Education Foundation</h2>
  <p>Gallery Management System</p>
</div>

<nav>
  <a href="admin.html">Admin</a>
  <a href="index.html">Home</a>
  <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="container">

  <div class="card">
    <h2>📸 Upload Gallery Image</h2>
    <input type="text" id="title" placeholder="Event Title">
    <textarea id="description" placeholder="Event Description"></textarea>
    <input type="date" id="event_date">
    <input type="file" id="image" accept="image/*">
    <button onclick="uploadGallery()">Upload Image</button>
  </div>

  <div class="card">
    <h2>🖼 Gallery Records</h2>
    <div id="galleryList" class="gallery-grid"></div>
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let allGallery = [];

async function uploadGallery(){
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const event_date = document.getElementById("event_date").value;
  const imageFile = document.getElementById("image").files[0];

  if(!title || !imageFile){
    alert("Title and image required");
    return;
  }

  const fileName = Date.now() + "_" + imageFile.name;

  const { error: uploadError } = await client.storage
    .from("gallery")
    .upload(fileName, imageFile);

  if(uploadError){
    console.log(uploadError);
    alert("Image upload failed");
    return;
  }

  const { data: publicUrlData } = client.storage
    .from("gallery")
    .getPublicUrl(fileName);

  const image_url = publicUrlData.publicUrl;

  const { error } = await client
    .from("gallery")
    .insert([{
      title,
      description,
      event_date,
      image_url
    }]);

  if(error){
    console.log(error);
    alert("Gallery save failed");
    return;
  }

  alert("Gallery image uploaded successfully ✅");

  document.getElementById("title").value = "";
  document.getElementById("description").value = "";
  document.getElementById("event_date").value = "";
  document.getElementById("image").value = "";

  loadGallery();
}

async function loadGallery(){
  const { data, error } = await client
    .from("gallery")
    .select("*")
    .order("id", { ascending:false });

  if(error){
    console.log(error);
    return;
  }

  allGallery = data || [];
  renderGallery();
}

function renderGallery(){
  const box = document.getElementById("galleryList");
  box.innerHTML = "";

  if(allGallery.length===0){
    box.innerHTML = "<p>No gallery images uploaded yet.</p>";
    return;
  }

  allGallery.forEach(g => {
    box.innerHTML += `
      <div class="gallery-item">
        <img src="${g.image_url}" alt="Gallery Image">
        <div class="gallery-content">
          <h3>${g.title}</h3>
          <p>${g.description || ""}</p>
          <small>${g.event_date || ""}</small><br><br>
          <button class="delete-btn" onclick="deleteGallery(${g.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

async function deleteGallery(id){
  if(!confirm("Delete this gallery image?")) return;

  await client
    .from("gallery")
    .delete()
    .eq("id", id);

  loadGallery();
}

function logout(){
  localStorage.clear();
  location.href = "index.html";
}

loadGallery();
</script>

</body>
</html>
