<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SEF AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  min-height:100vh;
  background:rgba(255,255,255,0.95);
  padding:20px;
}

.logo{text-align:center}
.logo img{width:80px}
.logo h2{color:#065f46}

/* MENU */
.menu a{
  display:block;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  background:#ecfdf5;
  color:#065f46;
  transition:0.3s;
}
.menu a:hover{
  background:#16a34a;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
  background:rgba(240,253,244,0.9);
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

/* BOX */
.box{
  margin-top:20px;
  background:#f0fdf4;
  padding:20px;
  border-radius:12px;
}

/* FIX GRAPH FULL WIDTH */
.chart-box{
  width:100%;
  height:320px;
}

canvas{
  width:100% !important;
  height:100% !important;
}

li{padding:8px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<audio id="ding" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">
<img src="logo.png">
<h2>Shubhi Education Foundation</h2>
</div>

<div class="menu">
<a href="#">🏠 Dashboard</a>
<a href="index.html">🏡 Home</a>
<a href="donors.html">👥 Donors</a>
<a href="donate.html">💳 Donate</a>
<a href="admin.html">⚙️ Admin</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>AI Dashboard</h1>

<div class="cards">
<div class="card"><h3>Total</h3><p id="total">₹0</p></div>
<div class="card"><h3>Donors</h3><p id="donors">0</p></div>
<div class="card"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card"><h3>Month</h3><p id="month">₹0</p></div>
</div>

<div class="box">
<h3>Last 7 Days</h3>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<div class="box">
<h3>Top Donors</h3>
<ul id="top"></ul>
</div>

<div class="box">
<h3>Recent Donations</h3>
<ul id="recent"></ul>
</div>

<div class="box">
<h3>🤖 AI Insight</h3>
<p id="insight"></p>
</div>

</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;
let lastCount = 0;

async function load(){

const { data } = await client
.from("donations")
.select("*")
.order("created_at",{ascending:true});

if(!data || data.length===0) return;

// 🔔 SOUND
if(lastCount && data.length > lastCount){
  document.getElementById("ding").play();
}
lastCount = data.length;

// TOTAL
let total=0;
data.forEach(d=> total+=Number(d.amount)||0);

document.getElementById("total").innerText="₹"+total;
document.getElementById("donors").innerText=data.length;

// TODAY / MONTH
let today=0,month=0;
let now=new Date();

data.forEach(d=>{
let dt=new Date(d.created_at);
if(dt.toDateString()===now.toDateString()) today+=Number(d.amount)||0;
if(dt.getMonth()===now.getMonth()) month+=Number(d.amount)||0;
});

document.getElementById("today").innerText="₹"+today;
document.getElementById("month").innerText="₹"+month;

// GRAPH FIX
let days=[...Array(7)].map((_,i)=>{
let d=new Date();
d.setDate(d.getDate()-(6-i));
return d.toISOString().split('T')[0];
});

let totals=days.map(day=>{
return data.filter(d=>(d.created_at||"").startsWith(day))
.reduce((s,d)=>s+(Number(d.amount)||0),0);
});

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:days.map(d=> new Date(d).toLocaleDateString()),
datasets:[{
label:"Donations ₹",
data:totals,
borderColor:"#16a34a",
backgroundColor:"rgba(34,197,94,0.2)",
fill:true,
tension:0.4
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

// TOP
let top=document.getElementById("top");
top.innerHTML="";
[...data].sort((a,b)=>b.amount-a.amount).slice(0,5)
.forEach(d=>{
top.innerHTML+=`<li>${d.name} - ₹${d.amount}</li>`;
});

// RECENT
let recent=document.getElementById("recent");
recent.innerHTML="";
data.slice(-5).reverse().forEach(d=>{
recent.innerHTML+=`<li>${d.name} donated ₹${d.amount}</li>`;
});

// 🤖 AI
let avg = Math.round(total/data.length);
let bestDay = days[totals.indexOf(Math.max(...totals))];

document.getElementById("insight").innerHTML =
"📊 Best Day: "+ new Date(bestDay).toLocaleDateString() +
"<br>💰 Avg Donation: ₹"+avg+
"<br>🚀 Total: ₹"+total;

}

// AUTO REFRESH
setInterval(load,5000);

load();
</script>

</body>
</html>
