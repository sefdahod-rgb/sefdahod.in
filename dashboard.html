<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SEF Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  min-height:100vh;
  background:rgba(255,255,255,0.95);
  padding:20px;
  box-shadow:0 0 25px rgba(0,0,0,0.1);
}

.logo{
  text-align:center;
}
.logo img{
  width:80px;
}
.logo h2{
  font-size:16px;
  color:#065f46;
}

/* MENU */
.menu{
  margin-top:20px;
}
.menu a{
  display:block;
  padding:12px;
  margin:10px 0;
  text-decoration:none;
  border-radius:10px;
  background:#ecfdf5;
  color:#065f46;
  font-weight:500;
  transition:0.3s;
}
.menu a:hover{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  transform:translateX(6px);
}
.menu a.active{
  background:linear-gradient(135deg,#16a34a,#15803d);
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
  background:rgba(240,253,244,0.85);
}

/* HEADER */
.header{
  text-align:center;
}
.header h1{
  color:#065f46;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.card p{
  font-size:26px;
  color:#16a34a;
}

/* BOX */
.box{
  margin-top:20px;
  background:#f0fdf4;
  padding:20px;
  border-radius:12px;
}

/* CHART */
.chart-box{
  height:280px;
}

/* LIST */
ul{list-style:none;padding:0}
li{
  padding:10px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="logo.png">
<h2>Shubhi Education Foundation</h2>
</div>

<div class="menu">
<a href="#" class="active">🏠 Dashboard</a>
<a href="index.html">🏡 Home</a>
<a href="donors.html">👥 Donors</a>
<a href="donate.html">💳 Donate</a>
<a href="admin.html">⚙️ Admin</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Dashboard</h1>
<p>Live Donation Overview</p>
</div>

<div class="cards">
<div class="card"><h3>Total</h3><p id="total">₹0</p></div>
<div class="card"><h3>Donors</h3><p id="donors">0</p></div>
<div class="card"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card"><h3>Month</h3><p id="month">₹0</p></div>
</div>

<div class="box">
<h3>Last 7 Days</h3>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<div class="box">
<h3>Top Donors</h3>
<ul id="top"></ul>
</div>

<div class="box">
<h3>Recent Donations</h3>
<ul id="recent"></ul>
</div>

<div class="box">
<h3>AI Insight</h3>
<p id="insight">Loading...</p>
</div>

</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "PASTE_YOUR_NEW_ANON_KEY_HERE"
);

let chart;

async function load(){

const { data } = await client
.from("donations")
.select("*");

if(!data) return;

let total=0;
data.forEach(d=> total+=Number(d.amount)||0);

document.getElementById("total").innerText="₹"+total;
document.getElementById("donors").innerText=data.length;

// TODAY
let today=0,month=0;
let now=new Date();

data.forEach(d=>{
let dt=new Date(d.created_at);
if(dt.toDateString()===now.toDateString()) today+=Number(d.amount)||0;
if(dt.getMonth()===now.getMonth()) month+=Number(d.amount)||0;
});

document.getElementById("today").innerText="₹"+today;
document.getElementById("month").innerText="₹"+month;

// CHART
let days=[...Array(7)].map((_,i)=>{
let d=new Date();
d.setDate(d.getDate()-(6-i));
return d.toISOString().split('T')[0];
});

let totals=days.map(day=>{
return data.filter(d=>(d.created_at||"").startsWith(day))
.reduce((s,d)=>s+(Number(d.amount)||0),0);
});

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:days,
datasets:[{
data:totals,
borderColor:"#22c55e",
fill:true
}]
}
});

// AI
document.getElementById("insight").innerText =
"Total ₹"+total+" collected from "+data.length+" donors";

// TOP
let top=document.getElementById("top");
top.innerHTML="";
[...data].sort((a,b)=>b.amount-a.amount).slice(0,5)
.forEach(d=>{
top.innerHTML+=`<li>${d.name} - ₹${d.amount}</li>`;
});

// RECENT
let recent=document.getElementById("recent");
recent.innerHTML="";
data.slice(-5).reverse().forEach(d=>{
recent.innerHTML+=`<li>${d.name} ₹${d.amount}</li>`;
});

}

load();
</script>

</body>
</html>
