<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SEF Ultra Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#ecfdf5;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#065f46;
  color:#fff;
  min-height:100vh;
  padding:20px;
}

.sidebar h2{margin:0;font-size:16px}
.sidebar p{font-size:12px;color:#d1fae5}

/* MENU */
.menu a{
  display:block;
  padding:12px;
  margin:8px 0;
  text-decoration:none;
  background:#ecfdf5;
  color:#065f46;
  border-radius:8px;
}
.menu a:hover{
  background:#22c55e;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card p{
  font-size:22px;
  color:#16a34a;
}

/* BOX */
.box{
  margin-top:20px;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

/* CHART */
.chart-box{
  height:300px;
}
canvas{
  width:100%!important;
  height:100%!important;
}

/* LIST */
li{
  padding:8px;
  border-bottom:1px solid #eee;
}

/* BUTTON */
.admin-btn{
  background:red;
  color:#fff;
  border:none;
  padding:4px 8px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔔 SOUND -->
<audio id="ding" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Shubhi Education Foundation</h2>
<p>Dahod, Gujarat</p>

<div class="menu">
<a href="#">Dashboard</a>
<a href="index.html">Home</a>
<a href="donate.html">Donate</a>
<a href="admin.html">Admin</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>🚀 Live Dashboard</h1>

<div class="cards">
<div class="card"><h3>Total</h3><p id="total">₹0</p></div>
<div class="card"><h3>Donors</h3><p id="donors">0</p></div>
<div class="card"><h3>Today</h3><p id="today">₹0</p></div>
</div>

<div class="box">
<h3>📊 Last 7 Days</h3>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<div class="box">
<h3>🏆 Top Donors</h3>
<ul id="top"></ul>
</div>

<div class="box">
<h3>🕒 Recent Donations</h3>
<ul id="recent"></ul>
</div>

<div class="box">
<h3>🤖 AI Insights</h3>
<p id="ai"></p>
</div>

</div>

<script>
const supabaseClient = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;
let lastCount = 0;

// 🎤 VOICE
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-IN";
  speechSynthesis.speak(msg);
}

async function load(){

const { data, error } = await supabaseClient
.from("donations")
.select("*")
.order("created_at",{ascending:true});

if(error){
console.log(error);
return;
}

if(!data || data.length === 0){
document.getElementById("top").innerHTML="<li>No data</li>";
document.getElementById("recent").innerHTML="<li>No data</li>";
return;
}

// 🔔 ALERT + VOICE + WHATSAPP
if(lastCount && data.length > lastCount){

let last = data[data.length-1];

// sound
document.getElementById("ding").play();

// voice
speak("New donation received " + last.amount + " rupees");

// whatsapp
window.open(`https://wa.me/?text=New Donation ₹${last.amount} by ${last.name}`);

}

lastCount = data.length;

// TOTAL
let total=0;
data.forEach(d=> total+=Number(d.amount)||0);

document.getElementById("total").innerText="₹"+total;
document.getElementById("donors").innerText=data.length;

// TODAY
let today=0;
let now=new Date();

data.forEach(d=>{
let dt=new Date(d.created_at);
if(dt.toDateString()===now.toDateString())
today+=Number(d.amount)||0;
});

document.getElementById("today").innerText="₹"+today;

// GRAPH
let days=[...Array(7)].map((_,i)=>{
let d=new Date();
d.setDate(d.getDate()-(6-i));
return d.toISOString().split('T')[0];
});

let totals=days.map(day=>{
return data.filter(d=>(d.created_at||"").startsWith(day))
.reduce((s,d)=>s+(Number(d.amount)||0),0);
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:days.map(d=> new Date(d).toLocaleDateString()),
datasets:[{
label:"Donations",
data:totals,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.2)",
fill:true,
tension:0.4
}]
},
options:{responsive:true,maintainAspectRatio:false}
});

// TOP DONORS
let top=document.getElementById("top");
top.innerHTML="";
[...data].sort((a,b)=>b.amount-a.amount).slice(0,5)
.forEach(d=>{
top.innerHTML+=`<li>${d.name} - ₹${d.amount}</li>`;
});

// RECENT
let recent=document.getElementById("recent");
recent.innerHTML="";
data.slice(-5).reverse().forEach(d=>{
recent.innerHTML+=`<li>${d.name} donated ₹${d.amount}</li>`;
});

// 🤖 AI
let avg=Math.round(total/data.length||0);
document.getElementById("ai").innerText=
"Average Donation ₹"+avg+" | Total ₹"+total;

}

// AUTO REFRESH
setInterval(load,5000);
load();
</script>

</body>
</html>
