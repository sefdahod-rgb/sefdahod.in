<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - Shubhi Education Foundation</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.stats{display:flex;gap:15px;flex-wrap:wrap}
.card-box{flex:1;min-width:200px;background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.card-box h3{font-size:14px;color:#666}
.card-box p{font-size:22px;font-weight:bold}
.list{margin-top:20px;background:#fff;padding:15px;border-radius:10px}
</style>
</head>

<body>
<div class="overlay">

<header>
<h1>Dashboard - Shubhi Education Foundation</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html" class="active">Dashboard</a>
<a href="donate.html">Donate</a>
<a href="receipt.html">Receipt</a>
<a href="donors.html">Donors</a>
<a href="admin.html">Admin</a>
</nav>

<section>

<div class="stats">
<div class="card-box"><h3>Total Donation</h3><p id="total">₹0</p></div>
<div class="card-box"><h3>Total Donors</h3><p id="donors">0</p></div>
<div class="card-box"><h3>Average</h3><p id="avg">₹0</p></div>
<div class="card-box"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card-box"><h3>This Month</h3><p id="month">₹0</p></div>
</div>

<div class="list">
<h3>Last 7 Days</h3>
<canvas id="chart"></canvas>
</div>

<div class="list">
<h3>Top Donors</h3>
<ul id="topDonors"></ul>
</div>

<div class="list">
<h3>Recent Donations</h3>
<ul id="recent"></ul>
</div>

</section>
</div>

<script>
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

async function load(){
  try {
    const { data, error } = await client.from("donations").select("*");

    if (error) {
      console.log("DB ERROR:", error);
      return;
    }

    console.log("DATA:", data); // DEBUG

    const rows = Array.isArray(data) ? data : [];

    // 👉 SAFE NUMBERS
    const amounts = rows.map(r => Number(r.amount) || 0);

    const total = amounts.reduce((s,v)=>s+v,0);
    const donors = rows.length;
    const avg = donors ? Math.round(total/donors) : 0;

    // 👉 DATE CALC
    let today = 0, month = 0;
    const now = new Date();

    rows.forEach(r=>{
      if(!r.created_at) return;

      const dt = new Date(r.created_at);
      const amt = Number(r.amount) || 0;

      if (dt.toDateString() === now.toDateString()) {
        today += amt;
      }

      if (dt.getMonth() === now.getMonth() &&
          dt.getFullYear() === now.getFullYear()) {
        month += amt;
      }
    });

    // 👉 UI UPDATE (force text)
    document.getElementById("total").textContent = "₹ " + total;
    document.getElementById("donors").textContent = donors;
    document.getElementById("avg").textContent = "₹ " + avg;
    document.getElementById("today").textContent = "₹ " + today;
    document.getElementById("month").textContent = "₹ " + month;

    // 👉 CHART
    const days = [];
    for(let i=6;i>=0;i--){
      const d = new Date();
      d.setDate(d.getDate()-i);
      days.push(d.toISOString().split('T')[0]);
    }

    const totals = days.map(day=>{
      return rows
        .filter(r => r.created_at && r.created_at.startsWith(day))
        .reduce((sum,r)=> sum + (Number(r.amount)||0),0);
    });

    new Chart(document.getElementById("chart"),{
      type:"bar",
      data:{
        labels: days.map(d=> new Date(d).toLocaleDateString()),
        datasets:[{ label:"Donations ₹", data:totals }]
      }
    });

    // 👉 TOP DONORS
    const top = document.getElementById("topDonors");
    top.innerHTML = "";
    [...rows]
      .sort((a,b)=>(Number(b.amount)||0)-(Number(a.amount)||0))
      .slice(0,5)
      .forEach(d=>{
        top.innerHTML += `<li>${d.name || "Unknown"} - ₹${d.amount || 0}</li>`;
      });

    // 👉 RECENT
    const recent = document.getElementById("recent");
    recent.innerHTML = "";
    [...rows]
      .slice(-5)
      .reverse()
      .forEach(d=>{
        recent.innerHTML += `<li>${d.name || "Unknown"} donated ₹${d.amount || 0}</li>`;
      });

  } catch(err) {
    console.log("SCRIPT ERROR:", err);
  }
}

load();
</script>
