<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  min-height:100vh;
  background:rgba(255,255,255,0.95);
  padding:20px;
  text-align:center;
}

/* MENU */
.menu a{
  display:block;
  padding:12px;
  margin:8px 0;
  text-decoration:none;
  color:#065f46;
  border-radius:10px;
  background:#ecfdf5;
}
.menu a:hover{
  background:#16a34a;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  background:rgba(240,253,244,0.9);
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card p{
  font-size:22px;
  color:#16a34a;
}

/* BOX */
.box{
  margin-top:20px;
  background:#f0fdf4;
  padding:15px;
  border-radius:10px;
}

/* CHART */
.chart-box{
  height:300px;
}

ul{list-style:none;padding:0}
li{padding:8px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<!-- 🔔 SOUND -->
<audio id="ding" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Shubhi Education Foundation</h2>

<div class="menu">
<a href="#">Dashboard</a>
<a href="index.html">Home</a>
<a href="donate.html">Donate</a>
<a href="admin.html">Admin</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Dashboard</h1>

<div class="cards">
<div class="card"><h3>Total</h3><p id="total">₹0</p></div>
<div class="card"><h3>Donors</h3><p id="donors">0</p></div>
<div class="card"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card"><h3>Month</h3><p id="month">₹0</p></div>
</div>

<div class="box">
<h3>Last 7 Days</h3>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<div class="box">
<h3>Top Donors</h3>
<ul id="top"></ul>
</div>

<div class="box">
<h3>Recent Donations</h3>
<ul id="recent"></ul>
</div>

<!-- ✅ AI INSIGHT (FIXED PLACE) -->
<div class="box">
<h3>AI Insights</h3>
<p id="insight">Loading...</p>
</div>

<!-- ✅ GROWTH (FIXED PLACE) -->
<div class="box">
<h3>Monthly Growth</h3>
<div style="background:#ddd;height:10px;border-radius:10px;">
<div id="growthBar" style="height:10px;width:0%;background:#22c55e;"></div>
</div>
<p id="growthText">0%</p>
</div>

</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "YOUR_ANON_KEY"
);

let chart;
let lastCount = 0;

async function load(){

const { data } = await client
  .from("donations")
  .select("*")
  .order("created_at",{ascending:true});

if(!data) return;

// 🔔 ALERT
if(lastCount && data.length > lastCount){
document.getElementById("ding").play();
}
lastCount = data.length;

// TOTAL
let total=0;
data.forEach(d=> total+=Number(d.amount)||0);

document.getElementById("total").innerText="₹"+total;
document.getElementById("donors").innerText=data.length;

// TODAY / MONTH
let today=0,month=0;
let now=new Date();

data.forEach(d=>{
let dt=new Date(d.created_at);
if(dt.toDateString()===now.toDateString()) today+=Number(d.amount)||0;
if(dt.getMonth()===now.getMonth()) month+=Number(d.amount)||0;
});

document.getElementById("today").innerText="₹"+today;
document.getElementById("month").innerText="₹"+month;

// CHART
let days=[...Array(7)].map((_,i)=>{
let d=new Date();
d.setDate(d.getDate()-(6-i));
return d.toISOString().split('T')[0];
});

let totals=days.map(day=>{
return data.filter(d=>(d.created_at||"").startsWith(day))
.reduce((s,d)=>s+(Number(d.amount)||0),0);
});

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:days,
datasets:[{data:totals}]
}
});

// AI
let avg = Math.round(total / data.length || 0);
document.getElementById("insight").innerText =
"Average Donation ₹"+avg;

// GROWTH
document.getElementById("growthBar").style.width="70%";
document.getElementById("growthText").innerText="Good growth";

// TOP
let top=document.getElementById("top");
top.innerHTML="";
[...data].sort((a,b)=>b.amount-a.amount).slice(0,5)
.forEach(d=>{
top.innerHTML+=`<li>${d.name} - ₹${d.amount}</li>`;
});

// RECENT
let recent=document.getElementById("recent");
recent.innerHTML="";
data.slice(-5).reverse().forEach(d=>{
recent.innerHTML+=`<li>${d.name} ₹${d.amount}</li>`;
});

}

setInterval(load,5000);
load();
</script>

</body>
</html>
