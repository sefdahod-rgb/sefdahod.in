<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - Shubhi Education Foundation</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.stats{display:flex;gap:15px;flex-wrap:wrap}
.card-box{flex:1;min-width:200px;background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.card-box h3{font-size:14px;color:#666}
.card-box p{font-size:22px;font-weight:bold}

.list{margin-top:20px;background:#fff;padding:15px;border-radius:10px}
</style>
</head>

<body>
<div class="overlay">

<header>
<h1>Dashboard - Shubhi Education Foundation</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html" class="active">Dashboard</a>
<a href="donate.html">Donate</a>
<a href="donors.html">Donors</a>
<a href="admin.html">Admin</a>
</nav>

<section>

<div class="stats">
<div class="card-box"><h3>Total Donation</h3><p id="total">₹0</p></div>
<div class="card-box"><h3>Total Donors</h3><p id="donors">0</p></div>
<div class="card-box"><h3>Average</h3><p id="avg">₹0</p></div>
<div class="card-box"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card-box"><h3>This Month</h3><p id="month">₹0</p></div>
</div>

<div class="list">
<h3>Last 7 Days</h3>
<canvas id="chart"></canvas>
</div>

<div class="list">
<h3>Top Donors</h3>
<ul id="topDonors"></ul>
</div>

<div class="list">
<h3>Recent Donations</h3>
<ul id="recent"></ul>
</div>

</section>
</div>

<script>
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "YOUR_SUPABASE_KEY"
);

async function load(){

const { data, error } = await client
  .from("donations")
  .select("*")
  .eq("status","success");

if(error){
  console.log(error);
  return;
}

// 📊 Stats
let total = 0;
data.forEach(d=> total += Number(d.amount)||0);

const donors = data.length;
const avg = donors ? Math.round(total/donors) : 0;

// 📅 Today / Month
let today = 0;
let month = 0;

const now = new Date();

data.forEach(d=>{
  const dt = new Date(d.created_at);

  if(dt.toDateString() === now.toDateString()){
    today += Number(d.amount)||0;
  }

  if(dt.getMonth() === now.getMonth()){
    month += Number(d.amount)||0;
  }
});

document.getElementById("total").innerText = "₹"+total;
document.getElementById("donors").innerText = donors;
document.getElementById("avg").innerText = "₹"+avg;
document.getElementById("today").innerText = "₹"+today;
document.getElementById("month").innerText = "₹"+month;

// 📈 Last 7 days
const days = [...Array(7)].map((_,i)=>{
  const d = new Date();
  d.setDate(d.getDate()- (6-i));
  return d.toISOString().split('T')[0];
});

const totals = days.map(day=>{
  return data.filter(d=> (d.created_at||"").startsWith(day))
  .reduce((s,d)=> s + (Number(d.amount)||0),0);
});

new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{
    labels: days.map(d=> new Date(d).toLocaleDateString()),
    datasets:[{data:totals}]
  }
});

// 🏆 Top Donors
const sorted = [...data].sort((a,b)=> b.amount - a.amount).slice(0,5);
const top = document.getElementById("topDonors");

sorted.forEach(d=>{
  top.innerHTML += `<li>${d.name} - ₹${d.amount}</li>`;
});

// 🕒 Recent
const recent = document.getElementById("recent");

data.slice(-5).reverse().forEach(d=>{
  recent.innerHTML += `<li>${d.name} donated ₹${d.amount}</li>`;
});

}

load();
</script>

</body>
</html>
