<h2>Total Donations</h2>
<h1 id="total">₹0</h1>
<p id="count">0 Donors</p>
</div>

<script>
const supabase = supabase.createClient(
  'https://kqahcvaxomxmicgyyync.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg'
);

async function loadDashboard() {
  const { data, error } = await supabase.from('donations').select('amount');
  if (error) { document.getElementById('total').innerText = 'ERROR: ' + error.message; return; }

  const total = data.reduce((sum, d) => sum + Number(d.amount), 0);
  document.getElementById('total').innerText = ₹${total};
  document.getElementById('count').innerText = ${data.length} Donors;
}
loadDashboard();
</script>
