let allAppointments = [];

/* ===========================
   PHOTO UPLOAD FUNCTION
=========================== */
async function uploadPhoto(file){

  if(!file) return "";

  const fileName = Date.now() + "_" + file.name;

  const { error } = await client.storage
    .from("appointments")
    .upload(fileName, file);

  if(error){
    alert("Photo upload failed");
    return "";
  }

  const { data } = client.storage
    .from("appointments")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

/* ===========================
   ADD APPOINTMENT
=========================== */
async function addAppointment(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;
  const designation = document.getElementById("designation").value.trim();
  const joining_date = document.getElementById("joining_date").value;
  const salary = Number(document.getElementById("salary").value) || 0;
  const remarks = document.getElementById("remarks").value.trim();
  const email = document.getElementById("email").value.trim();

  const photoFile =
    document.getElementById("photo").files[0];

  if(!name || !designation){
    alert("Name and designation required");
    return;
  }

  let photoUrl = "";

  if(photoFile){
    photoUrl = await uploadPhoto(photoFile);
  }

  const appointment_no = "APP-" + Date.now();

  const { error } = await client
    .from("appointments")
    .insert([{
      appointment_no,
      name,
      type,
      designation,
      joining_date,
      salary,
      remarks,
      email,
      photo: photoUrl
    }]);

  if(error){
    console.log(error);
    alert("Failed to create appointment");
    return;
  }

  alert("Appointment created successfully ✅");

  document.getElementById("name").value="";
  document.getElementById("designation").value="";
  document.getElementById("joining_date").value="";
  document.getElementById("salary").value="";
  document.getElementById("remarks").value="";
  document.getElementById("email").value="";
  document.getElementById("photo").value="";

  load();
}

/* ===========================
   LOAD APPOINTMENTS
=========================== */
async function load(){

  const { data, error } = await client
    .from("appointments")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    return;
  }

  allAppointments = data || [];
  render(allAppointments);
}

/* ===========================
   RENDER TABLE
=========================== */
function render(data){

  const table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Appointment No</th>
      <th>Name</th>
      <th>Photo</th>
      <th>Type</th>
      <th>Designation</th>
      <th>Joining Date</th>
      <th>Salary</th>
      <th>Actions</th>
    </tr>
  `;

  if(data.length===0){
    table.innerHTML += `
      <tr><td colspan="8">No appointments found</td></tr>
    `;
    return;
  }

  data.forEach(a=>{

    table.innerHTML += `
      <tr>
        <td>${a.appointment_no || "-"}</td>
        <td>${a.name || "-"}</td>
        <td>
          ${a.photo ? `<img src="${a.photo}" width="50" height="60">` : "-"}
        </td>
        <td>${a.type || "-"}</td>
        <td>${a.designation || "-"}</td>
        <td>${a.joining_date || "-"}</td>
        <td>₹${a.salary || 0}</td>
        <td>
          <button onclick="printAppointment(${a.id})">
            Print
          </button>

          <button onclick="sendEmail(
            '${a.email || ""}',
            '${a.name}',
            '${a.appointment_no}'
          )">
            Email
          </button>

          <button onclick="deleteAppointment(${a.id})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

/* ===========================
   DELETE
=========================== */
async function deleteAppointment(id){

  if(!confirm("Delete this appointment?")) return;

  await client
    .from("appointments")
    .delete()
    .eq("id",id);

  load();
}

/* ===========================
   EMAIL LETTER
=========================== */
function sendEmail(email,name,no){

  if(!email){
    alert("Candidate email not available");
    return;
  }

  const subject =
    `Appointment Letter - ${no}`;

  const body =
    `Dear ${name},%0D%0A%0D%0A` +
    `Congratulations! Your appointment letter has been issued.%0D%0A` +
    `Appointment No: ${no}%0D%0A%0D%0A` +
    `Regards,%0D%0AShubhi Education Foundation`;

  window.open(
    `mailto:${email}?subject=${subject}&body=${body}`
  );
}
