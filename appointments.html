<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Appointments Management - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f3f4f6;
}
.header{
  background:#7c3aed;
  color:#fff;
  text-align:center;
  padding:15px;
}
.header img{
  width:60px;
}
nav{
  text-align:center;
  padding:10px;
  background:#6d28d9;
}
nav a{
  color:#fff;
  text-decoration:none;
  margin:5px;
  padding:8px 14px;
  display:inline-block;
  background:#7c3aed;
  border-radius:6px;
}
.card{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:10px;
}
input,select,textarea{
  padding:8px;
  margin:5px;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#7c3aed;
  color:#fff;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
th{
  background:#7c3aed;
  color:#fff;
}
.search{
  width:100%;
  padding:10px;
  margin-top:10px;
}
@media print{
  nav,.no-print,button,input,select,textarea{
    display:none;
  }
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","appointments.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h2>Shubhi Education Foundation</h2>
  <p>Under Indian Society Act 1860 Guj./2249/DHD. & Mumbai Public Trust Act 1950 F/2247/DHD<p>
<p>Appointment Management System</p>
</div>

<nav>
<a href="admin.html">Admin</a>
<a href="members.html">Members</a>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<div class="card">
<h3>Create Appointment Letter</h3>

<input type="text" id="name" placeholder="Candidate Name">

<select id="type">
<option value="Volunteer">Volunteer</option>
<option value="Staff">Staff</option>
<option value="Internship">Internship</option>
<option value="Project Coordinator">Project Coordinator</option>
</select>

<input type="text" id="designation" placeholder="Designation">

<input type="date" id="joining_date">

<input type="number" id="salary" placeholder="Salary / Stipend">

<textarea id="remarks" placeholder="Terms / Notes"></textarea>

<button onclick="addAppointment()">Create Appointment</button>
</div>

<div class="card">
<h3>Appointments List</h3>

<input type="text" id="search" class="search" placeholder="Search Appointment...">

<button onclick="exportCSV()" class="no-print">Export CSV</button>
<button onclick="window.print()" class="no-print">Print</button>

<table id="table"></table>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let allAppointments=[];

/* PHOTO UPLOAD */
async function uploadCandidatePhoto(file){

  if(!file) return "";

  const fileName =
    "appointment_" + Date.now() + "_" + file.name;

  const { error } = await client
    .storage
    .from("appointments")
    .upload(fileName, file);

  if(error){
    console.log(error);
    alert("Photo upload failed");
    return "";
  }

  const { data } = client
    .storage
    .from("appointments")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

/* LOAD */
async function load(){

  const { data, error } = await client
    .from("appointments")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    alert("Error loading appointments");
    return;
  }

  allAppointments = data || [];
  render(allAppointments);
}

/* RENDER */
function render(data){

  const table = document.getElementById("table");

  table.innerHTML = `
  <tr>
    <th>Appointment No</th>
    <th>Photo</th>
    <th>Name</th>
    <th>Email</th>
    <th>Type</th>
    <th>Designation</th>
    <th>Joining Date</th>
    <th>Salary</th>
    <th>Actions</th>
  </tr>`;

  if(data.length===0){
    table.innerHTML += `<tr><td colspan="9">No appointments found</td></tr>`;
    return;
  }

  data.forEach(a=>{

    table.innerHTML += `
    <tr>
      <td>${a.appointment_no || "-"}</td>
      <td>
        ${a.photo
          ? `<img src="${a.photo}" width="50" height="50" style="border-radius:50%;object-fit:cover;">`
          : "-"}
      </td>
      <td>${a.name || "-"}</td>
      <td>${a.email || "-"}</td>
      <td>${a.type || "-"}</td>
      <td>${a.designation || "-"}</td>
      <td>${a.joining_date || "-"}</td>
      <td>₹${a.salary || 0}</td>
      <td>
        <button onclick="editAppointment(${a.id})">Edit</button>
        <button onclick="deleteAppointment(${a.id})">Delete</button>
        <button onclick="printAppointment(
          '${a.appointment_no}',
          '${a.name}',
          '${a.email || ""}',
          '${a.photo || ""}',
          '${a.type}',
          '${a.designation}',
          '${a.joining_date}',
          '${a.salary}',
          \`${a.remarks || ""}\`
        )">Print</button>
      </td>
    </tr>`;
  });
}

/* ADD */
async function addAppointment(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const type = document.getElementById("type").value;
  const designation = document.getElementById("designation").value.trim();
  const joining_date = document.getElementById("joining_date").value;
  const salary = Number(document.getElementById("salary").value) || 0;
  const remarks = document.getElementById("remarks").value.trim();

  const photoFile =
    document.getElementById("photo").files[0];

  if(!name || !designation){
    alert("Name and designation required");
    return;
  }

  const photoUrl =
    await uploadCandidatePhoto(photoFile);

  const appointment_no =
    "SEF-APP-" +
    new Date().getFullYear() +
    "-" +
    Date.now();

  const { error } = await client
    .from("appointments")
    .insert([{
      appointment_no,
      name,
      email,
      photo:photoUrl,
      type,
      designation,
      joining_date,
      salary,
      remarks
    }]);

  if(error){
    console.log(error);
    alert("Failed to create appointment");
    return;
  }

  alert("Appointment created successfully ✅");

  document.getElementById("name").value="";
  document.getElementById("email").value="";
  document.getElementById("designation").value="";
  document.getElementById("joining_date").value="";
  document.getElementById("salary").value="";
  document.getElementById("remarks").value="";
  document.getElementById("photo").value="";

  load();
}

/* DELETE */
async function deleteAppointment(id){

  if(!confirm("Delete this appointment?")) return;

  await client
    .from("appointments")
    .delete()
    .eq("id",id);

  load();
}

/* EDIT */
async function editAppointment(id){

  const ap = allAppointments.find(x=>x.id===id);

  let newName = prompt("Name", ap.name);
  let newDesignation = prompt("Designation", ap.designation);
  let newSalary = prompt("Salary", ap.salary);

  if(!newName) return;

  await client
    .from("appointments")
    .update({
      name:newName,
      designation:newDesignation,
      salary:newSalary
    })
    .eq("id",id);

  load();
}

/* SEARCH */
document.getElementById("search")
.addEventListener("input", function(){

  const val = this.value.toLowerCase();

  render(
    allAppointments.filter(a =>
      (a.name || "").toLowerCase().includes(val) ||
      (a.appointment_no || "").toLowerCase().includes(val)
    )
  );
});

/* EXPORT CSV */
function exportCSV(){

  let csv =
    "Appointment No,Name,Email,Type,Designation,Joining Date,Salary\n";

  allAppointments.forEach(a=>{
    csv += `${a.appointment_no},${a.name},${a.email},${a.type},${a.designation},${a.joining_date},${a.salary}\n`;
  });

  const blob = new Blob([csv],{type:"text/csv"});
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "appointments.csv";
  link.click();
}

/* PRINT LETTER */

  const finalPhoto =
    photo && photo !== ""
    ? photo
    : "user.png";

  const w = window.open("", "_blank");

  w.document.write(`

      </div>

      </div>

  if(email && email !== ""){

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

/* INIT */
load();
</script>


</body>
</html>
```
