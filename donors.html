<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donors - SEF</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav>
  <a href="index.html">Home</a>
  <a href="donate.html">Donate</a>
  <a href="donors.html">Donors</a>
  <a href="dashboard.html">Dashboard</a>
</nav>

<div class="container">
<h2>All Donors</h2>
<table>
  <thead><tr><th>Name</th><th>Email</th><th>Amount (₹)</th><th>Date</th></tr></thead>
  <tbody id="donorTable"><tr><td colspan="4">Loading...</td></tr></tbody>
</table>
</div>

<script>
const supabase = supabase.createClient(
  'https://kqahcvaxomxmicgyyync.supabase.co',
  'sb_publishable_5185f6qc75cmeSYhAPxVA_Rj_wvZv'
);

async function loadDonors() {
  const { data, error } = await supabase.from('donations').select('*').order('id', { ascending: false });
  const tbody = document.getElementById('donorTable');

  if (error) { tbody.innerHTML = <tr><td colspan="4" style="color:#f87171">Error: ${error.message}</td></tr>; return; }
  if (!data.length) { tbody.innerHTML = <tr><td colspan="4">Koi donation abhi nahi hui</td></tr>; return; }

  tbody.innerHTML = data.map(d => <tr><td>${d.name}</td><td>${d.email}</td><td>₹${d.amount}</td><td>${new Date(d.created_at).toLocaleString()}</td></tr>).join('');
}
loadDonors();
</script>
</body>
</html>
