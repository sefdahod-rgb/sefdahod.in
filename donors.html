<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Donors - SEF</title>
<style>
body{font-family:Arial;background:url('bg.jpg') center/cover fixed;color:#fff;padding:40px}
table{width:100%;border-collapse:collapse;background:rgba(0,0,0,0.7)}
th,td{padding:12px;border-bottom:1px solid #555}
th{background:#ff5722}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>All Donors</h2>
<table><thead><tr><th>Name</th><th>Email</th><th>Amount (₹)</th><th>Date</th></tr></thead>
<tbody id="donorTable"><tr><td colspan="4">Loading...</td></tr></tbody></table>

<script>
const supabase = supabase.createClient(
  'https://kqahcvaxomxmicgyyync.supabase.co',
  'sb_publishable_5185f6qc75cmeSYhAPxVA_Rj_wvZv'
);

async function loadDonors() {
  const { data, error } = await supabase.from('donations').select('*').order('id', { ascending: false });
  const tbody = document.getElementById('donorTable');

  if (error) { tbody.innerHTML = <tr><td colspan="4">${error.message}</td></tr>; return; }
  if (data.length === 0) { tbody.innerHTML = <tr><td colspan="4">Koi donation nahi</td></tr>; return; }

  tbody.innerHTML = data.map(d => <tr><td>${d.name}</td><td>${d.email}</td><td>₹${d.amount}</td><td>${new Date(d.created_at).toLocaleString()}</td></tr>).join('');
}
loadDonors();
</script>
</body>
</html>
