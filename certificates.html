<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"YOUR_SUPABASE_KEY"
);

let allCertificates=[];

/* DATE FORMAT ONLY */
function formatDate(dateString){
  if(!dateString) return "-";
  return new Date(dateString).toLocaleDateString('en-GB');
}

/* LOAD */
async function load(){

  const { data, error } = await client
    .from("certificates")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    alert("Error loading certificates");
    return;
  }

  allCertificates = data || [];
  render(allCertificates);
}

/* RENDER */
function render(data){

  const table = document.getElementById("table");

  table.innerHTML = `
  <tr>
    <th>Certificate No</th>
    <th>Name</th>
    <th>Type</th>
    <th>Issue Date</th>
    <th>Remarks</th>
    <th>Actions</th>
  </tr>`;

  if(data.length===0){
    table.innerHTML += `<tr><td colspan="6">No certificates found</td></tr>`;
    return;
  }

  data.forEach(c=>{

    table.innerHTML += `
    <tr>
      <td>${c.cert_no || "-"}</td>
      <td>${c.name || "-"}</td>
      <td>${c.type || "-"}</td>
      <td>${formatDate(c.issue_date)}</td>
      <td>${c.remarks || "-"}</td>
      <td>
        <button onclick="editCertificate(${c.id})">Edit</button>
        <button onclick="deleteCertificate(${c.id})">Delete</button>
        <button onclick="printCertificate('${c.cert_no}','${c.name}','${c.type}','${c.issue_date}','${c.remarks}')">Print</button>
      </td>
    </tr>`;
  });
}

/* ADD */
async function addCertificate(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;
  const issue_date = document.getElementById("issue_date").value;
  const remarks = document.getElementById("remarks").value.trim();

  if(!name){
    alert("Recipient name required");
    return;
  }

  const cert_no = "CERT-" + Date.now();

  const { error } = await client
    .from("certificates")
    .insert([{
      cert_no,
      name,
      type,
      issue_date,
      remarks
    }]);

  if(error){
    console.log(error);
    alert("Failed to issue certificate");
    return;
  }

  alert("Certificate issued successfully ✅");

  document.getElementById("name").value="";
  document.getElementById("issue_date").value="";
  document.getElementById("remarks").value="";

  load();
}

/* DELETE */
async function deleteCertificate(id){

  if(!confirm("Delete this certificate?")) return;

  await client
    .from("certificates")
    .delete()
    .eq("id",id);

  load();
}

/* EDIT */
async function editCertificate(id){

  const cert = allCertificates.find(x=>x.id===id);

  let newName = prompt("Recipient Name", cert.name);
  let newRemarks = prompt("Remarks", cert.remarks);

  if(!newName) return;

  await client
    .from("certificates")
    .update({
      name:newName,
      remarks:newRemarks
    })
    .eq("id",id);

  load();
}

/* SEARCH */
document.getElementById("search")
.addEventListener("input", function(){

  const val = this.value.toLowerCase();

  render(
    allCertificates.filter(c =>
      (c.name || "").toLowerCase().includes(val) ||
      (c.cert_no || "").toLowerCase().includes(val)
    )
  );
});

/* EXPORT CSV */
function exportCSV(){

  let csv = "Certificate No,Name,Type,Issue Date,Remarks\n";

  allCertificates.forEach(c=>{
    csv += `${c.cert_no},${c.name},${c.type},${formatDate(c.issue_date)},${c.remarks}\n`;
  });

  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "certificates.csv";
  a.click();
}

/* PRINT CERTIFICATE */

}

</script>
