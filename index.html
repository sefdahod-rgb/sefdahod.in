<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubhi Education Foundation</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1588072432836-e10032774350');
background-size:cover;
text-align:center;
}

h1{font-size:40px;}

.btn{
background:#00ffcc;
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
}

.container{max-width:1100px;margin:auto;padding:20px;}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:20px 0;
border-radius:15px;
}

.progress{background:#222;border-radius:20px;}
.bar{background:#00ffcc;height:20px;width:0;}

input{
padding:10px;width:80%;margin:5px;border-radius:8px;border:none;
}

.slider img{
width:100%;
border-radius:10px;
display:none;
}

.slider img.active{display:block;}

</style>
</head>

<body>

<header>
<h1>🌈 Rainbow Public School</h1>
<p>Shubhi Education Foundation, Dahod</p>
<button class="btn">Donate Now</button>
</header>

<div class="container">

<div class="card">
<h2>📊 Donation Progress</h2>
<p>Target: ₹10 Crore</p>
<div class="progress"><div class="bar" id="bar"></div></div>
<p id="count">₹0 Raised</p>
</div>

<div class="card" style="text-align:center;">
<h2>💰 Donate</h2>
<input type="number" id="amount" placeholder="Enter amount">
<br>
<button class="btn" onclick="donate()">Donate Now</button>
</div>

<div class="card">
<h2>📸 Gallery</h2>
<div class="slider">
<img src="poster.png" class="active">
<img src="poster.png">
<img src="poster.png">
</div>
</div>

<div class="card">
<h2>👥 Volunteer</h2>
<input placeholder="Name"><br>
<input placeholder="Mobile"><br>
<button class="btn">Submit</button>
</div>

<div class="card">
<h2>📞 Contact</h2>
<p>📱 9408695001</p>
<p>📧 rpsdhd12@gmail.com</p>
</div>

</div>

<script>

// progress animation
let bar=document.getElementById("bar");
let count=document.getElementById("count");
let value=0;

let interval=setInterval(()=>{
value+=50000;
bar.style.width=(value/1000000000*100)+"%";
count.innerHTML="₹"+value.toLocaleString()+" Raised";
if(value>=1500000) clearInterval(interval);
},100);

// slider
let slides=document.querySelectorAll(".slider img");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},2000);

// donate button
function donate(){
let amt=document.getElementById("amount").value;
alert("Donate ₹"+amt+" (Razorpay connect baad me hoga)");
}

</script>

// Save donation
function saveDonation(name, amount){
  db.collection("donations").add({
    name: name,
    amount: amount,
    time: new Date()
  }).then(()=>{
    alert("Donation Saved ✅");
  });
}

</body>
