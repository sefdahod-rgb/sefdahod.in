<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubhi Education Foundation</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1588072432836-e10032774350');
background-size:cover;
}

h1{font-size:40px;margin:10px;}

.btn{
background:#00ffcc;
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
font-weight:bold;
}

.container{max-width:1100px;margin:auto;padding:20px;}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:20px 0;
border-radius:15px;
box-shadow:0 5px 25px rgba(0,0,0,0.3);
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:80%;
}

.progress{background:#222;border-radius:20px;}
.bar{background:#00ffcc;height:20px;width:0;}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<header>
<h1>🌈 Rainbow Public School</h1>
<p>Shubhi Education Foundation, Dahod</p>
<button class="btn">Donate Now</button>
</header>

<div class="container">

<div class="card">
<h2>📊 Donation Progress</h2>
<p>Target: ₹10 Crore</p>
<div class="progress"><div class="bar" id="bar"></div></div>
<p id="count">₹0 Raised</p>
</div>

<div class="card" style="text-align:center;">
<h2>💰 Donate</h2>
<input type="text" id="name" placeholder="Your Name"><br>
<input type="number" id="amount" placeholder="Enter Amount"><br>
<button class="btn" onclick="donate()">Donate</button>
</div>

<div class="card">
<h2>📞 Contact</h2>
<p>📱 9408695001</p>
<p>📧 rpsdhd12@gmail.com</p>
</div>

</div>

<a class="whatsapp" href="https://wa.me/919408695001">💬</a>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDPfCHyGSBWBpMUqOe5cMttnpbclJ2d9o",
  authDomain: "sefdahod-7859b.firebaseapp.com",
  projectId: "sefdahod-7859b",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// donation function
function donate(){
let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;

if(name=="" || amount==""){
alert("Fill details");
return;
}

db.collection("donations").add({
name:name,
amount:amount,
time:new Date()
});

alert("Thank you for donation!");
}

// live counter
let total=0;
db.collection("donations").onSnapshot(snap=>{
total=0;
snap.forEach(doc=>{
total+=parseInt(doc.data().amount);
});
document.getElementById("count").innerHTML="₹"+total.toLocaleString()+" Raised";

document.getElementById("bar").style.width=(total/1000000000*100)+"%";
});
</script>

</body>
</html>
