<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEF - Shree Education Foundation</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#fff5f7,#ffe0ec)}
header{background:#e91e63;color:#fff;position:sticky;top:0}
nav{display:flex;justify-content:space-between;padding:15px}
nav a{color:#fff;margin:0 10px;text-decoration:none}
section{max-width:900px;margin:30px auto;padding:20px;background:#fff;border-radius:10px}
h2{text-align:center;color:#e91e63;margin-bottom:10px}
input,textarea{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:12px;background:#e91e63;color:#fff;border:none}
.total{font-size:30px;text-align:center;color:#e91e63}
</style>
</head>

<body>

<header>
<nav>
<h2>SEF</h2>
<div>
<a href="#donate">Donate</a>
<a href="#donors">Donors</a>
</div>
</nav>
</header>

<section id="donate">
<h2>Donation Form</h2>

<form id="donateForm">
<input id="name" placeholder="Name" required>
<input id="email" type="email" placeholder="Email" required>
<input id="amount" type="number" placeholder="Amount ₹" required>
<textarea id="message" placeholder="Message"></textarea>
<button type="submit">Donate</button>
</form>

<p id="msg"></p>
</section>

<section id="donors">
<h2>Donors List</h2>
<div id="list">Loading...</div>
</section>

<section>
<h2>Total Donation</h2>
<div id="total" class="total">₹0</div>
</section>

<script>
const supabaseClient = supabase.createClient(
  "kqahcvaoxnmxfcgyyync",
  "sb_publishable_S1BSJ6qcJ5Emg-5YhXPmVA_Rj_wvZvl"
);

// SUBMIT
document.getElementById("donateForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const { error } = await supabaseClient.from("donations").insert([{
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    amount: Number(document.getElementById("amount").value),
    message: document.getElementById("message").value
  }]);

  if(error){
    document.getElementById("msg").innerText = error.message;
  } else {
    document.getElementById("msg").innerText = "Donation Saved ✅";
    document.getElementById("donateForm").reset();
    loadDonors();
    loadTotal();
  }
});

// LOAD DONORS
async function loadDonors(){
  const { data, error } = await supabaseClient
    .from("donations")
    .select("*")
    .order("created_at",{ascending:false});

  const list = document.getElementById("list");

  if(error){
    list.innerText = error.message;
    return;
  }

  list.innerHTML = (data || []).map(d => `
    <div>
      <b>${d.name}</b> - ₹${d.amount}
      <div style="font-size:12px">
        ${new Date(d.created_at).toLocaleString()}
      </div>
      ${d.message ? `<div>${d.message}</div>` : ""}
      <hr>
    </div>
  `).join("") || "No donors yet";
}

// TOTAL
async function loadTotal(){
  const { data } = await supabaseClient
    .from("donations")
    .select("amount");

  const total = (data || []).reduce((a,b)=>a+(b.amount||0),0);

  document.getElementById("total").innerText = "₹" + total;
}

// LOAD
loadDonors();
loadTotal();
</script>

</body>
</html>
