<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubhi Education Foundation</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#e91e63;color:#fff;padding:15px;text-align:center}
section{padding:20px;max-width:800px;margin:auto}
input,button{width:100%;padding:10px;margin:5px 0}
button{background:#e91e63;color:white;border:none}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px}
.total{font-size:30px;text-align:center;color:#e91e63}
</style>
</head>

<body>

<header>
<h1>Shubhi Education Foundation</h1>
<p>Dahod | Donate for Education</p>
</header>

<section>
<h2>Donate Now</h2>
<form id="form">
<input id="name" placeholder="Name" required>
<input id="amount" type="number" placeholder="Amount ₹" required>
<button>Donate</button>
</form>

<p id="msg"></p>

<h3>Scan & Pay (GPay)</h3>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9408695001@upi&pn=SEF" />

</section>

<section>
<h2>Total Donation</h2>
<div class="total" id="total">₹0</div>
</section>

<section>
<h2>Donors</h2>
<div id="list"></div>
</section>

<script>

const supabaseClient = supabase.createClient(
  'https://kqahcvaxomxmcgyyync.supabase.co',
  'PASTE_YOUR_KEY_HERE'
);

// ADD DONATION
document.getElementById('form').addEventListener('submit', async(e)=>{
e.preventDefault();

const name=document.getElementById('name').value;
const amount=document.getElementById('amount').value;

const {error}=await supabaseClient.from('donations').insert([{name,amount}]);

if(error){
document.getElementById('msg').innerText=error.message;
}else{
document.getElementById('msg').innerText="Thank you!";
load();
}
});

// LOAD DATA
async function load(){
const {data}=await supabaseClient.from('donations').select('*');

document.getElementById('list').innerHTML=
(data||[]).map(d=><div class="card">${d.name} - ₹${d.amount}</div>).join('');

document.getElementById('total').innerText="₹"+
(data||[]).reduce((a,b)=>a+b.amount,0);
}

load();

</script>

</body>
</html>
