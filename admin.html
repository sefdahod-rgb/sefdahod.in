<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin - Shubhi Education Foundation</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.hide{display:none;}
.logout-btn{
  background:red;
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  float:right;
}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#f2f2f2;}
</style>
</head>

<body>

<script>
// 🔐 HARD SECURITY CHECK (BLOCK DIRECT ACCESS)
if(localStorage.getItem("isAdmin") !== "true"){
  alert("Access Denied! Please login first.");
  window.location.href = "login.html";
}
</script>

<div class="overlay">

<header>
  <img src="logo.png">
  <h1>Shubhi Education Foundation, Dahod</h1>

  <!-- LOGOUT BUTTON -->
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<p>
Under Indian Society Act 1860 & Mumbai Public Trust Act 1950
</p>

<nav>
  <a href="index.html">Home</a>
  <a href="donate.html">Donate</a>
  <a href="donors.html">Donors</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="admin.html" class="active">Admin</a>
</nav>

<section>
<div class="card">

<h2>Admin Panel</h2>

<p id="loading">Loading data...</p>

<table id="adminTable"></table>

</div>
</section>

</div>

<script>

// 🔐 SUPABASE CONNECTION
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "YOUR_SUPABASE_ANON_KEY"
);

// 🚀 LOGOUT FUNCTION (FINAL)
function logout(){
  localStorage.removeItem("isAdmin");
  sessionStorage.clear();
  alert("Logged out successfully");
  window.location.href = "login.html";
}

// 📦 LOAD DATA
async function load(){

  const { data, error } = await client
    .from("donations")
    .select("*")
    .order("id", { ascending: false });

  const table = document.getElementById("adminTable");

  if(error){
    table.innerHTML = "<tr><td>Error loading data</td></tr>";
    return;
  }

  document.getElementById("loading").style.display = "none";

  table.innerHTML = `
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.email}</td>
        <td>₹${d.amount}</td>
        <td>${new Date(d.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="deleteDonor('${d.id}')" style="background:red;color:white;border:none;padding:5px;">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

// 🗑 DELETE
async function deleteDonor(id){
  if(confirm("Are you sure?")){
    await client.from("donations").delete().eq("id", id);
    load();
  }
}

// INIT
load();

</script>

</body>
</html>
