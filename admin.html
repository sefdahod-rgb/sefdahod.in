<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.btn{padding:6px 10px;border:none;border-radius:5px;cursor:pointer}
.delete{background:red;color:#fff}
.logout{background:#333;color:#fff;float:right}
</style>
</head>

<body>

<div class="overlay">

<header>
  <h1>Admin Panel</h1>
  <button class="btn logout" onclick="logout()">Logout</button>
</header>

<section>
<div class="card">

<h2>Donations</h2>

<table id="adminTable" width="100%">
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</table>

</div>
</section>

</div>

<script>
// 🔐 LOGIN CHECK
if(localStorage.getItem("isAdmin") !== "yes"){
  alert("Login Required");
  window.location.href = "login.html";
}

// 🔌 Supabase
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

// 🔄 Load Data
async function load(){
  const { data, error } = await client
    .from("donations")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    alert("Error loading data");
    return;
  }

  const t = document.getElementById("adminTable");

  t.innerHTML = `
  <tr>
  <th>Name</th>
  <th>Email</th>
  <th>Amount</th>
  <th>Date</th>
  <th>Action</th>
  </tr>`;

  data.forEach(d=>{
    t.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.email}</td>
      <td>₹${d.amount}</td>
      <td>${new Date(d.created_at).toLocaleDateString()}</td>
      <td>
        <button class="btn delete" onclick="del(${d.id})">Delete</button>
      </td>
    </tr>`;
  });
}

// ❌ DELETE FIXED
async function del(id){
  if(confirm("Delete this donation?")){
    
    const { error } = await client
      .from("donations")
      .delete()
      .eq("id", id);

    if(error){
      alert("Delete failed");
      console.log(error);
      return;
    }

    alert("Deleted successfully");
    load(); // refresh
  }
}

// 🔓 LOGOUT
function logout(){
  localStorage.removeItem("isAdmin");
  window.location.href = "login.html";
}

// 🚀 Start
load();
</script>

</body>
</html>
