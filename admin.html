<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>
.btn{padding:6px 10px;border:none;border-radius:5px;cursor:pointer}
.delete{background:red;color:#fff}
.logout{background:#333;color:#fff;float:right}
.refresh{background:#0F9D58;color:#fff;margin-right:10px}
.search{padding:8px;width:100%;margin-bottom:10px}
</style>
</head>

<body>

<script>
// 🔐 LOCAL LOGIN CHECK (FINAL)
const check = localStorage.getItem("isAdmin");

if(check !== "yes"){
  alert("Login Required");
  window.location.href = "login.html";
}
</script>

<div class="overlay">

<header>
  <h1>Admin Panel</h1>
  <button class="btn logout" onclick="logout()">Logout</button>
</header>

<section>
<div class="card">

<h2>Donations</h2>

<input type="text" id="search" class="search" placeholder="Search by name...">

<button class="btn refresh" onclick="load()">Refresh</button>

<table id="adminTable" width="100%">
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</table>

</div>
</section>

</div>

<script>
// 📦 DATA (localStorage से)
let allData = JSON.parse(localStorage.getItem("donations")) || [];

// 🔄 LOAD DATA
function load(){
  render(allData);
}

// 📊 RENDER TABLE
function render(data){
  const t = document.getElementById("adminTable");

  t.innerHTML = `
  <tr>
  <th>Name</th>
  <th>Email</th>
  <th>Amount</th>
  <th>Date</th>
  <th>Action</th>
  </tr>`;

  data.forEach((d,index)=>{
    t.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.email}</td>
      <td>₹${d.amount}</td>
      <td>${d.date}</td>
      <td>
        <button class="btn delete" onclick="del(${index})">Delete</button>
      </td>
    </tr>`;
  });
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const filtered = allData.filter(d => d.name.toLowerCase().includes(val));
  render(filtered);
});

// ❌ DELETE
function del(index){
  if(confirm("Delete this donation?")){
    allData.splice(index,1);
    localStorage.setItem("donations", JSON.stringify(allData));
    load();
  }
}

// 🔓 LOGOUT
function logout(){

  if(confirm("Logout from admin panel?")){

    localStorage.removeItem("isAdmin");

    document.body.style.opacity = "0.5";

    setTimeout(()=>{
      window.location.href = "index.html";
    },500);
  }
}

// 🚀 START
load();
</script>

</body>
</html>
