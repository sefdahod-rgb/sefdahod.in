<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin - Shubhi Education Foundation</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN BOX */
.login-box{
  max-width:320px;
  margin:120px auto;
  background:#1e293b;
  padding:25px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  width:100%;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.login-btn{background:green;color:white}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111827;
  padding:10px 15px;
  border-radius:10px;
}

.logout{
  background:red;
  color:white;
  width:auto;
  padding:8px 15px;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #333;
}

th{background:#1e293b;}

.hide{display:none}
</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen" class="login-box">
  <h2>Admin Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button class="login-btn" onclick="login()">Login</button>

  <p id="msg" style="color:red"></p>
</div>

<!-- 🚀 DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="topbar">
    <h3>SEF Donation Dashboard</h3>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <table id="table"></table>

</div>

<script>

// 🔗 SUPABASE
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

// 🔐 LOGIN (SAME PAGE)
function login(){

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u==="admin" && p==="admin123"){

    localStorage.setItem("isAdmin","true");

    showDashboard();

  } else {
    document.getElementById("msg").innerText="Invalid login";
  }
}

// 🚪 LOGOUT (BACK TO LOGIN SCREEN)
function logout(){
  localStorage.removeItem("isAdmin");
  sessionStorage.clear();

  alert("Logged out successfully");

  // 👉 GO TO HOME PAGE
  window.location.href = "index.html";
}
// 🔁 SHOW LOGIN
function showLogin(){
  document.getElementById("loginScreen").style.display="block";
  document.getElementById("dashboard").style.display="none";
}

// 🔁 SHOW DASHBOARD
function showDashboard(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadData();
}

// 📦 LOAD DATA
async function loadData(){

  const { data } = await client
    .from("donations")
    .select("*")
    .order("id",{ascending:false});

  let table = document.getElementById("table");

  table.innerHTML=`
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Amount</th>
      <th>Action</th>
    </tr>
  `;

  data.forEach(d=>{
    table.innerHTML+=`
      <tr>
        <td>${d.name||"-"}</td>
        <td>${d.email||"-"}</td>
        <td>₹${d.amount||0}</td>
        <td>
          <button onclick="deleteRow('${d.id}')" style="background:red;color:white;border:none;padding:5px;">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

// 🗑 DELETE
async function deleteRow(id){
  if(confirm("Delete this record?")){
    await client.from("donations").delete().eq("id",id);
    loadData();
  }
}

// 🔐 AUTO CHECK
if(localStorage.getItem("isAdmin")==="true"){
  showDashboard();
}else{
  showLogin();
}

</script>
<script>
const pass = prompt("Enter Admin Password");

if(pass !== "SEF@123"){
  alert("Access Denied");
  window.location.href = "index.html";
}
</script>
</body>
</html>
