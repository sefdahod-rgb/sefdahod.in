<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ SUPABASE (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Segoe UI}

.btn{padding:6px 10px;border:none;border-radius:5px;cursor:pointer}
.delete{background:red;color:#fff}
.logout{
  background: linear-gradient(135deg,#ff4d4d,#cc0000);
  color:#fff;
  float:right;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
.refresh{background:#0F9D58;color:#fff;margin-right:10px}
.search{padding:8px;width:100%;margin-bottom:10px}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

th{
  background:#f5f5f5;
}
</style>
</head>

<body>

<script>
// 🔐 LOGIN CHECK
if(localStorage.getItem("isAdmin") !== "yes"){
  alert("Login Required");
  window.location.href = "login.html";
}
</script>

<div class="overlay">

<header>
  <h1>Admin Panel</h1>
  <button class="btn logout" onclick="logout()">Logout</button>
</header>

<section>
<div class="card">

<h2>Donations</h2>

<input type="text" id="search" class="search" placeholder="Search by name...">

<button class="btn refresh" onclick="load()">Refresh</button>

<table id="adminTable">
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</table>

</div>
</section>

</div>

<script>
// 🔌 SUPABASE CONNECT
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

// 📦 DATA STORE
let allData = [];

// 🔄 LOAD DATA
async function load(){
  const { data, error } = await client
    .from("donations")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    alert("Error loading data");
    return;
  }

  allData = data;
  render(data);
}

// 📊 RENDER TABLE
function render(data){
  const t = document.getElementById("adminTable");

  t.innerHTML = `
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Amount</th>
    <th>Date</th>
    <th>Action</th>
  </tr>`;

  if(!data || data.length === 0){
    t.innerHTML += `<tr><td colspan="5">No donations found</td></tr>`;
    return;
  }

  data.forEach(d=>{
    t.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.email}</td>
      <td>₹${d.amount}</td>
      <td>${new Date(d.created_at).toLocaleDateString()}</td>
      <td>
        <button class="btn delete" onclick="del(${d.id})">Delete</button>
      </td>
    </tr>`;
  });
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const filtered = allData.filter(d => d.name.toLowerCase().includes(val));
  render(filtered);
});

// ❌ DELETE
async function del(id){
  if(confirm("Delete this donation?")){

    const { error } = await client
      .from("donations")
      .delete()
      .eq("id", id);

    if(error){
      alert("Delete failed");
      console.log(error);
      return;
    }

    alert("Deleted successfully");
    load();
  }
}

// 🔓 LOGOUT
function logout(){
  if(confirm("Logout?")){
    localStorage.removeItem("isAdmin");
    window.location.href = "index.html";
  }
}

// 🚀 START
window.onload = load;
</script>

</body>
</html>
