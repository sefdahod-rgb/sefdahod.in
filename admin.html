<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Segoe UI;
  margin:0;
  background:#0f172a;
}

.overlay{
  padding:20px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  color:#fff;
  padding:15px;
  border-radius:10px;
}

.logout{
  background:linear-gradient(135deg,#ff4d4d,#cc0000);
  color:#fff;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#1e293b;
  color:#fff;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
}

/* INPUT */
.search{
  padding:10px;
  width:100%;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}

/* BUTTONS */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.refresh{
  background:#0F9D58;
  color:#fff;
  margin-bottom:10px;
}

.delete{
  background:#ff3333;
  color:#fff;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#111827;
  color:#fff;
}

th, td{
  padding:10px;
  border-bottom:1px solid #333;
}

th{
  background:#374151;
}
</style>
</head>

<body>

<script>
// 🔐 LOGIN CHECK
if(localStorage.getItem("isAdmin") !== "yes"){
  alert("Login Required");
  window.location.href = "login.html";
}
</script>

<div class="overlay">

<header>
  <h1>Admin Panel</h1>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="card">

<h2>Donations</h2>

<input type="text" id="search" class="search" placeholder="Search by name...">

<button class="btn refresh" onclick="load()">Refresh</button>

<table id="adminTable">
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</table>

</div>

</div>

<script>
// 🔌 SUPABASE
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "YOUR_ANON_KEY_HERE"
);

// 🔄 LOAD DATA
let allData = [];

async function load(){
  const { data, error } = await client
    .from("donations")
    .select("*")
    .order("id", { ascending:false });

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const t = document.getElementById("adminTable");

  t.innerHTML = `
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Amount</th>
    <th>Date</th>
    <th>Action</th>
  </tr>`;

  if(error){
    t.innerHTML += `<tr><td colspan="5">Error loading data</td></tr>`;
    return;
  }

  if(!data || data.length === 0){
    t.innerHTML += `<tr><td colspan="5">No data found</td></tr>`;
    return;
  }

  allData = data;

  render(data);
}

// 📊 RENDER
function render(data){
  const t = document.getElementById("adminTable");

  data.forEach(d=>{
    t.innerHTML += `
    <tr>
      <td>${d.name || "-"}</td>
      <td>${d.email || "-"}</td>
      <td>₹${d.amount || 0}</td>
      <td>${d.created_at ? new Date(d.created_at).toLocaleDateString() : "-"}</td>
      <td>
        <button class="btn delete" onclick="del(${d.id})">Delete</button>
      </td>
    </tr>`;
  });
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const filtered = allData.filter(d =>
    (d.name || "").toLowerCase().includes(val)
  );
  document.getElementById("adminTable").innerHTML = `
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Amount</th>
    <th>Date</th>
    <th>Action</th>
  </tr>`;
  render(filtered);
});

// ❌ DELETE
async function del(id){
  if(confirm("Delete this donation?")){
    const { error } = await client
      .from("donations")
      .delete()
      .eq("id", id);

    if(error){
      alert("Delete failed");
      console.log(error);
      return;
    }

    alert("Deleted");
    load();
  }
}

// 🔓 LOGOUT
function logout(){
  localStorage.clear();
  window.location.replace("index.html");
}

// 🚀 START
load();
</script>

</body>
</html>
