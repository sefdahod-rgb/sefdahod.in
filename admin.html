<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<script>
// 🔐 Simple Password Protection
const pass = prompt("Enter Admin Password");
if(pass !== "SEF@123"){
  alert("Access Denied");
  window.location.href = "index.html";
}
</script>

<div class="overlay">
<header>
  <h1>Admin Panel - Shubhi Education Foundation</h1>
</header>

<section>
<div class="card">

<h2>Donations</h2>

<input type="text" id="search" placeholder="Search by name..." style="padding:10px;width:100%">

<br><br>

<button onclick="exportCSV()" style="background:#28a745;color:#fff;padding:10px;border:none">Export CSV</button>

<br><br>

<table id="adminTable" border="1" width="100%">
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</table>

</div>
</section>
</div>

<script>
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let allData = [];

// 🔄 Load Data
async function load(){
  const { data, error } = await client
    .from("donations")
    .select("*")
    .eq("status","success")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    return;
  }

  allData = data;
  render(data);
}

// 📊 Render Table
function render(data){
  const t = document.getElementById("adminTable");

  t.innerHTML = `
  <tr>
  <th>Name</th>
  <th>Email</th>
  <th>Amount</th>
  <th>Date</th>
  <th>Action</th>
  </tr>`;

  data.forEach(d=>{
    t.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.email}</td>
      <td>₹${d.amount}</td>
      <td>${new Date(d.created_at).toLocaleDateString()}</td>
      <td>
        <button onclick="del(${d.id})" style="background:red;color:white;border:none;padding:5px">Delete</button>
      </td>
    </tr>`;
  });
}

// 🔍 Search
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const filtered = allData.filter(d => d.name.toLowerCase().includes(val));
  render(filtered);
});

// ❌ Delete
async function del(id){
  if(confirm("Delete this donation?")){
    await client.from("donations").delete().eq("id",id);
    load();
  }
}

// 📥 Export CSV
function exportCSV(){
  let csv = "Name,Email,Amount\n";

  allData.forEach(d=>{
    csv += `${d.name},${d.email},${d.amount}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "donations.csv";
  a.click();
}

// 🚀 Load
load();
</script>

</body>
</html>
