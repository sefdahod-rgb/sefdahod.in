<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Ultra Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:15px 20px;
}

.logo{height:50px}
.title{font-weight:bold}

.actions{
  display:flex;
  gap:10px;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.logout{background:#ff3333;color:#fff}
.toggle{background:#444;color:#fff}

/* STATS */
.stats{
  display:flex;
  gap:15px;
  padding:20px;
  flex-wrap:wrap;
}

.box{
  flex:1;
  min-width:150px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}
.box:hover{transform:scale(1.05)}

.box h3{font-size:12px;color:#aaa}
.box p{font-size:22px;font-weight:bold}

/* CARD */
.card{
  background:#1e293b;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

.search{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  margin-bottom:10px;
}

/* TABLE */
.table-wrap{
  max-height:400px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #333;
}

th{
  background:#374151;
  position:sticky;
  top:0;
}

tr:hover{
  background:#1f2937;
}

/* BUTTON COLORS */
.delete{background:#ff4444;color:#fff}
.edit{background:#f59e0b;color:#fff}
.refresh{background:#0F9D58;color:#fff}
.export{background:#2563eb;color:#fff}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin") !== "yes"){
  alert("Login Required");
  location.href="login.html";
}
</script>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <img src="logo.png" class="logo">
    <div class="title">Shubhi Education Foundation</div>
  </div>

  <div class="actions">
    <button class="btn toggle" onclick="toggleMode()">🌗</button>
    <button class="btn logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="box"><h3>Total</h3><p id="total">₹0</p></div>
  <div class="box"><h3>Today</h3><p id="today">₹0</p></div>
  <div class="box"><h3>This Month</h3><p id="month">₹0</p></div>
  <div class="box"><h3>Donors</h3><p id="count">0</p></div>
</div>

<!-- TABLE -->
<div class="card">

<input type="text" id="search" class="search" placeholder="Search name...">

<button class="btn refresh" onclick="load()">Refresh</button>
<button class="btn export" onclick="exportCSV()">Export CSV</button>

<div class="table-wrap">
<table id="table"></table>
</div>

</div>

<script>
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let allData=[];

async function load(){
  const {data,error}=await client.from("donations").select("*").order("id",{ascending:false});

  if(error){
    console.log(error);
    return;
  }

  allData=data || [];

  render(allData);
  stats(allData);
}

function render(data){
  const t=document.getElementById("table");

  if(data.length===0){
    t.innerHTML="<tr><td>No Data</td></tr>";
    return;
  }

  t.innerHTML=`<tr>
<th>Name</th><th>Email</th><th>Amount</th><th>Date</th><th>Action</th>
</tr>`;

  data.forEach(d=>{
    t.innerHTML+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.email||"-"}</td>
      <td>₹${d.amount}</td>
      <td>${new Date(d.created_at).toLocaleDateString()}</td>
      <td>
        <button class="btn edit" onclick="edit(${d.id},'${d.name}',${d.amount})">Edit</button>
        <button class="btn delete" onclick="del(${d.id})">Delete</button>
      </td>
    </tr>`;
  });
}

function stats(data){
  let total=0,today=0,month=0;
  const now=new Date();

  data.forEach(d=>{
    const amt=Number(d.amount)||0;
    total+=amt;

    const dt=new Date(d.created_at);

    if(dt.toDateString()===now.toDateString()) today+=amt;
    if(dt.getMonth()===now.getMonth()) month+=amt;
  });

  document.getElementById("total").innerText="₹"+total;
  document.getElementById("today").innerText="₹"+today;
  document.getElementById("month").innerText="₹"+month;
  document.getElementById("count").innerText=data.length;
}

// SEARCH
document.getElementById("search").addEventListener("input",function(){
  const val=this.value.toLowerCase();
  render(allData.filter(d=>d.name.toLowerCase().includes(val)));
});

// DELETE
async function del(id){
  if(confirm("Delete this donation?")){
    await client.from("donations").delete().eq("id",id);
    load();
  }
}

// EDIT
async function edit(id,name,amount){
  let newName=prompt("Edit Name",name);
  let newAmount=prompt("Edit Amount",amount);

  if(!newName || !newAmount) return;

  await client.from("donations").update({
    name:newName,
    amount:newAmount
  }).eq("id",id);

  load();
}

// EXPORT CSV
function exportCSV(){
  let csv="Name,Email,Amount\n";
  allData.forEach(d=>{
    csv+=`${d.name},${d.email||""},${d.amount}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="donations.csv";
  a.click();
}

// DARK/LIGHT MODE
function toggleMode(){
  if(document.body.style.background=="white"){
    document.body.style.background="#0f172a";
    document.body.style.color="#fff";
  }else{
    document.body.style.background="white";
    document.body.style.color="#000";
  }
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.href="index.html";
}

// AUTO REFRESH
setInterval(load,10000);

load();
</script>

</body>
</html>
