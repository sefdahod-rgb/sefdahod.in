<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin - Shubhi Education Foundation</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<div class="overlay">

<header>
  <img src="logo.png">
  <h1>Shubhi Education Foundation, Dahod</h1>
</header>

<p>Under Indian Society Act 1860 Guj./2249/DHD & Mumbai Public Trust Act 1950 F/2247/DHD</p>

<nav>
  <a href="index.html">Home</a>
  <a href="donate.html">Donate</a>
  <a href="donors.html">Donors</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="admin.html" class="active">Admin</a>
</nav>

<section>
<div class="card">
<h2>Admin Panel</h2>

<div id="adminArea" class="hide">
  <table id="adminTable"></table>
</div>

<p id="adminLock">Please login to access admin panel.</p>

</div>
</section>

</div>

<script>

// Login check
if(localStorage.getItem('isAdmin')==='yes'){
  document.getElementById('adminArea').classList.remove('hide');
  document.getElementById('adminLock').classList.add('hide');
}

// Supabase
const client = window.supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

// Load data
async function load(){

  const { data, error } = await client
    .from("donations")
    .select("*")
    .order("id", { ascending: false });

  const t = document.getElementById("adminTable");

  // header
  t.innerHTML = `
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  if(error){
    console.log(error);
    return;
  }

  // rows
  data.forEach(d => {
    t.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.email}</td>
        <td>${d.amount}</td>
        <td>${new Date(d.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="deleteDonor(${d.id})" style="background:red;color:white">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

// Delete
async function deleteDonor(id){
  if(confirm("Delete this donation?")){
    await client.from("donations").delete().eq("id", id);
    load();
  }
}

// Start
load();

</script>

</body>
</html>
