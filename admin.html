.card{padding:20px;background:white;border-radius:10px;}

</head>

<body>

<section>
<div class="card">

<h2>Admin Panel</h2>

<p id="loading">Loading donations...</p>

<table id="adminTable"></table>

</div>
</section>

</div>

<script>

const SUPABASE_URL = "https://kqahcvaoxnmxfcgyyync.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🚪 LOGOUT (FINAL)
function logout(){
  localStorage.removeItem("isAdmin");
  sessionStorage.clear();
  alert("Logged out successfully");
  window.location.href = "login.html";
}

// 📦 LOAD DONATIONS
async function load(){

  const { data, error } = await client
    .from("donations")
    .select("*")
    .order("id", { ascending: false });

  const table = document.getElementById("adminTable");

  if(error){
    table.innerHTML = "<tr><td>Error loading data</td></tr>";
    return;
  }

  document.getElementById("loading").style.display = "none";

  table.innerHTML = `
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.name || "-"}</td>
        <td>${d.email || "-"}</td>
        <td>₹${d.amount || 0}</td>
        <td>${d.created_at ? new Date(d.created_at).toLocaleDateString() : "-"}</td>
        <td>
          <button onclick="deleteDonor('${d.id}')" style="background:red;color:white;border:none;padding:5px;">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

// 🗑 DELETE
async function deleteDonor(id){

  if(confirm("Delete this donation?")){

    const { error } = await client
      .from("donations")
      .delete()
      .eq("id", id);

    if(error){
      alert("Delete failed");
    } else {
      load();
    }
  }
}

// INIT
load();

</script>

</body>
