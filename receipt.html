<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donation Receipt</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eaeaea;
  padding: 20px;
}

.receipt {
  max-width: 750px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  border: 1px solid #ccc;
  position: relative;
}

/* Watermark */
.receipt::before {
  content: "SEF";
  position: absolute;
  font-size: 120px;
  color: rgba(0,0,0,0.05);
  top: 40%;
  left: 30%;
  transform: rotate(-30deg);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header img {
  height: 70px;
}

/* Title */
.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin: 20px 0;
  border-bottom: 2px solid #000;
}

/* Table */
.table {
  width: 100%;
  border-collapse: collapse;
}

.table td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.amount {
  color: green;
  font-weight: bold;
}

/* Footer */
.footer {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
}

/* Button */
button {
  margin-top: 20px;
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

@media print {
  button { display: none; }
}
</style>
</head>

<body>

<div class="receipt">

<div class="header">
  <img src="logo.png">
  <h2>Shubhi Education Foundation</h2>
</div>

<div class="title">DONATION RECEIPT</div>

<table class="table">
<tr><td><b>Receipt No:</b></td><td id="rno"></td></tr>
<tr><td><b>Date:</b></td><td id="date"></td></tr>
<tr><td><b>Name:</b></td><td id="name"></td></tr>
<tr><td><b>Email:</b></td><td id="email"></td></tr>
<tr><td><b>Amount:</b></td><td class="amount">₹ <span id="amount"></span></td></tr>
<tr><td><b>Payment Mode:</b></td><td>UPI</td></tr>
</table>

<div class="footer">
  <div>Thank you for your support 🙏</div>
  <div>Signature</div>
</div>

<button onclick="window.print()">Download / Print</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const email = params.get("email");
const amount = params.get("amount");
const date = params.get("date");
const receipt = params.get("receipt");

// Fill data
document.getElementById("rno").innerText = receipt || "SEF-" + Date.now();
document.getElementById("date").innerText = date ? new Date(date).toLocaleDateString() : new Date().toLocaleDateString();
document.getElementById("name").innerText = name || "-";
document.getElementById("email").innerText = email || "-";
document.getElementById("amount").innerText = amount || "0";
</script>

</body>
</html>
