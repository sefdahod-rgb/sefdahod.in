<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donation Receipt</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.receipt {
  max-width: 700px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header img {
  height: 70px;
}

.title {
  text-align: center;
  margin: 20px 0;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 2px solid #000;
  padding-bottom: 5px;
}

.table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

.table td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.footer {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: green;
  color: #fff;
  border: none;
  cursor: pointer;
}

@media print {
  button { display: none; }
}
</style>

</head>

<body>

<div class="receipt">

  <div class="header">
    <img src="logo.png">
    <h2>Shubhi Education Foundation</h2>
  </div>

  <div class="title">DONATION RECEIPT</div>

  <table class="table">
    <tr>
      <td><b>Receipt No:</b></td>
      <td id="rno"></td>
    </tr>
    <tr>
      <td><b>Date:</b></td>
      <td id="date"></td>
    </tr>
    <tr>
      <td><b>Donor Name:</b></td>
      <td id="name"></td>
    </tr>
    <tr>
      <td><b>Email:</b></td>
      <td id="email"></td>
    </tr>
    <tr>
      <td><b>Amount:</b></td>
      <td>₹ <span id="amount"></span></td>
    </tr>
  </table>

  <div class="footer">
    <div>Thank you for your support 🙏</div>
    <div>Authorized Signature</div>
  </div>

  <button onclick="window.print()">Download / Print PDF</button>

</div>

<script>
// ✅ URL से data लो (FINAL FIX)
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const email = params.get("email");
const amount = params.get("amount");
const date = params.get("date");

if(name){
  document.getElementById("rno").innerText = "SEF-" + Date.now();
  document.getElementById("date").innerText = new Date(date).toLocaleDateString();
  document.getElementById("name").innerText = name;
  document.getElementById("email").innerText = email;
  document.getElementById("amount").innerText = amount;
} else {
  document.getElementById("name").innerText = "No Data";
}
</script>

</body>
</html>
