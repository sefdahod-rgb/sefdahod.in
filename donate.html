<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate - SEF</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav>
  <a href="index.html">Home</a>
  <a href="donate.html">Donate</a>
  <a href="donors.html">Donors</a>
  <a href="dashboard.html">Dashboard</a>
</nav>

<div class="container">
<h2>Donate Now</h2>
<form id="donateForm">
  <input id="name" type="text" placeholder="Aapka Naam" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="amount" type="number" placeholder="Amount (₹)" required min="1">
  <textarea id="message" placeholder="Message (optional)"></textarea>
  <button type="submit">Donate</button>
</form>
</div>

<script>
const supabase = supabase.createClient(
  'https://kqahcvaxomxmicgyyync.supabase.co',
  'sb_publishable_5185f6qc75cmeSYhAPxVA_Rj_wvZv'
);

document.getElementById('donateForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const amount = Number(document.getElementById('amount').value);
  const message = document.getElementById('message').value.trim();

  const { error } = await supabase.from('donations').insert([{ name, email, amount, message }]);

  if (error) {
    alert('Database Error: ' + error.message);
    console.error(error);
    return;
  }

  alert('Donation Saved!');
  window.location.href = upi://pay?pa=9488695001@okbizaxis&pn=SEF&am=${amount}&cu=INR;
  e.target.reset();
});
</script>
</body>
</html>
