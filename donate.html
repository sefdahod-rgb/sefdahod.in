<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate - SEF</title>
<style>
body{font-family:Arial;background:url('bg.jpg') center/cover fixed;color:#fff;text-align:center;padding:40px}
form{background:rgba(0,0,0,0.7);padding:20px;border-radius:12px;max-width:400px;margin:auto}
input,textarea,button{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px}
button{background:#ff5722;color:#fff;font-weight:bold;cursor:pointer}
button:hover{background:#e64a19}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>Donate Now</h2>
<form id="donateForm">
  <input id="name" type="text" placeholder="Aapka Naam" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="amount" type="number" placeholder="Amount (₹)" required>
  <textarea id="message" placeholder="Message (optional)"></textarea>
  <button type="submit">Donate</button>
</form>

<script>
const supabase = supabase.createClient(
  'https://kqahcvaxomxmicgyyync.supabase.co',
  'sb_publishable_5185f6qc75cmeSYhAPxVA_Rj_wvZv'   // ← UNDERSCORE, aapki asli key
);

document.getElementById('donateForm').addEventListener('submit', async (e) => {
  e.preventDefault();   // ← PAGE REFRESH ROKEGA

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const amount = Number(document.getElementById('amount').value);
  const message = document.getElementById('message').value.trim();

  const { error } = await supabase.from('donations').insert([{ name, email, amount, message }]);

  if (error) {
    alert('Database Error: ' + error.message);
    return;
  }

  alert('Donation Saved!');
  window.location.href = upi://pay?pa=9488695001@okbizaxis&pn=SEF&am=${amount}&cu=INR;
  e.target.reset();
});
</script>
</body>
</html>
