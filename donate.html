<!DOCTYPE html>
<html lang="hi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Donate - Shubhi Education Foundation</title><link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body><div class="overlay">
<header><img src="logo.png"><h1>Shubhi Education Foundation, Dahod</h1></header>
<nav>
  <a href="index.html">Home</a>
  <a href="donate.html" class="active">Donate</a>
  <a href="donors.html">Donors</a>
  <a href="finance.html">Finance</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="admin.html">Admin</a>
  <a href="login.html">Login</a>
</nav>
<section><div class="card">
<h2>Donate Now</h2>
<form id="donationForm">
  <input id="dname" placeholder="Your Full Name" required>
  <input id="demail" placeholder="Your Email" required>
  <input id="damt" type="number" placeholder="Donation Amount (₹)" required min="1">
  <input id="dmsg" placeholder="Message (Optional)">
  <button type="submit">Submit & Pay with GPay</button>
</form>
<div class="qr">
  <h3>Scan & Pay via UPI</h3>
  <img src="qr.jpeg" alt="UPI QR Code">
  <a class="gpay" id="gpayBtn" href="#">Pay with GPay</a>
  <p><strong>UPI ID:</strong> 9408695001-1@okbizaxis</p>
  <p style="color:#c00">Tip: Mobile se kholo, PC par GPay app nahi khulta</p>
</div>
</div></section>
<script>
const supabase = supabase.createClient(
  'https://kqahcvaxomxmicgyyync.supabase.co',
  'sb_publishable_5185f6qc75cme-SYhAPxVA_Rj_wvZv'
);
document.getElementById('donateForm').addEventListener('submit', async (e) => {
  e.preventDefault(); // ← YE LINE ZAROORI HAI

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const amount = document.getElementById('amount').value;
  const message = document.getElementById('message').value;

  const { error } = await supabase.from('donations').insert([{ name, email, amount, message }]);

  if (error) {
    alert('Error: ' + error.message);
    return;
  }

  alert('Donation recorded!');
  window.location.href = upi://pay?pa=9488695001@okbizaxis&pn=SEF&am=${amount}&cu=INR;
  e.target.reset();
});document.getElementById('gpayBtn').addEventListener('click',e=>{
  e.preventDefault();
  const amt=document.getElementById('damt').value||1;
  window.location.href=upi://pay?pa=9408695001-1@okbizaxis&pn=Shubhi%20Education%20Foundation&am=${amt}&cu=INR;
});
</script>
</body></html>
