<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance ERP Ultra - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.header{
  text-align:center;
  background:#fff;
  padding:20px;
}
.header img{width:60px}

/* NAV */
nav{text-align:center;padding:10px;}
nav a{
  margin:5px;
  padding:8px 12px;
  background:#16a34a;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card p{font-size:20px;color:#16a34a}

/* BOX */
.box{
  margin:15px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

/* BUTTON */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#16a34a;
  color:#fff;
  cursor:pointer;
}

/* CHART */
.chart-box{height:260px}

@media print{
  nav,button,input{display:none}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","finance.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h2>Shubhi Education Foundation</h2>
<p>Reg: Guj/2249/DHD | 80G | 12A | CSR</p>
<p>Finance ERP (Audit Ready)</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<!-- FILTER -->
<div class="box">
<h3>📅 Date Filter</h3>
<input type="date" id="from">
<input type="date" id="to">
<button class="btn" onclick="load()">Apply</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card"><h4>Total Income</h4><p id="income">₹0</p></div>
<div class="card"><h4>Total Expense</h4><p id="expense">₹0</p></div>
<div class="card"><h4>Balance</h4><p id="balance">₹0</p></div>
</div>

<!-- AI -->
<div class="box">
<h3>🤖 AI Insight</h3>
<p id="ai">Calculating...</p>
</div>

<!-- ADD -->
<div class="box">
<h3>➕ Add Income</h3>
<input id="inc_amt" placeholder="Amount">
<input id="inc_note" placeholder="Note">
<input type="date" id="inc_date">
<button class="btn" onclick="addIncome()">Add</button>
</div>

<div class="box">
<h3>➖ Add Expense</h3>
<input id="exp_amt" placeholder="Amount">
<input id="exp_note" placeholder="Note">
<input type="date" id="exp_date">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<!-- REPORT -->
<div class="box">
<h3>📊 Report</h3>
<button class="btn" onclick="printReport()">Print</button>
<button class="btn" onclick="exportCSV()">CSV</button>

<table id="table"></table>
</div>

<!-- CHART -->
<div class="box">
<h3>📈 Income vs Expense</h3>
<div class="chart-box"><canvas id="chart"></canvas></div>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;

async function load(){

let from=document.getElementById("from").value;
let to=document.getElementById("to").value;

// FETCH SAFE
const { data:don=[] } = await client.from("donations").select("*");
const { data:inc=[] } = await client.from("income").select("*");
const { data:exp=[] } = await client.from("expenses").select("*");

// FILTER
function check(d){
  if(!from || !to) return true;
  let dt=new Date(d.created_at).toISOString().split("T")[0];
  return dt>=from && dt<=to;
}

let donations=don.filter(check);
let income=inc.filter(check);
let expense=exp.filter(check);

// CALC
let totalIncome=0,totalExpense=0;

donations.forEach(d=> totalIncome+=Number(d.amount)||0);
income.forEach(i=> totalIncome+=Number(i.amount)||0);
expense.forEach(e=> totalExpense+=Number(e.amount)||0);

let balance=totalIncome-totalExpense;

// UI
income.innerText="₹"+totalIncome;
expense.innerText="₹"+totalExpense;
balance.innerText="₹"+balance;

// AI FIX
ai.innerText = balance>=0 
? "📈 Profit ₹"+balance 
: "⚠️ Loss ₹"+balance;

// TABLE
table.innerHTML=`<tr>
<th>Type</th><th>Amount</th><th>Note</th><th>Date</th>
</tr>`;

donations.forEach(d=>{
table.innerHTML+=`<tr>
<td>Donation</td>
<td>${d.amount}</td>
<td>${d.name}</td>
<td>${new Date(d.created_at).toLocaleDateString()}</td>
</tr>`;
});

income.forEach(i=>{
table.innerHTML+=`<tr>
<td>Income</td>
<td>${i.amount}</td>
<td>${i.note}</td>
<td>${new Date(i.created_at).toLocaleDateString()}</td>
</tr>`;
});

expense.forEach(e=>{
table.innerHTML+=`<tr>
<td>Expense</td>
<td>${e.amount}</td>
<td>${e.note}</td>
<td>${new Date(e.created_at).toLocaleDateString()}</td>
</tr>`;
});

// CHART
if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Income","Expense"],
datasets:[{
data:[totalIncome,totalExpense],
backgroundColor:["green","red"]
}]
}
});

}

// ADD
async function addIncome(){
await client.from("income").insert([{
amount:inc_amt.value,
note:inc_note.value,
created_at:inc_date.value || new Date()
}]);
load();
}

async function addExpense(){
await client.from("expenses").insert([{
amount:exp_amt.value,
note:exp_note.value,
created_at:exp_date.value || new Date()
}]);
load();
}

// CSV
function exportCSV(){
let rows=document.querySelectorAll("table tr");
let csv="";
rows.forEach(r=>{
let cols=r.querySelectorAll("td,th");
let row=[];
cols.forEach(c=>row.push(c.innerText));
csv+=row.join(",")+"\\n";
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

// PRINT
function printReport(){window.print();}


// logout 
function logout(){
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "index.html";
}
load();
</script>
</body>
</html>
</body>
</html>
