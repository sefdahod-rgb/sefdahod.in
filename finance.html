<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(rgba(240,253,244,0.9),rgba(240,253,244,0.9)),
              url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.header{
  text-align:center;
  background:#ffffff;
  padding:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.header img{width:80px}
.header h1{margin:5px;color:#065f46}

/* NAV */
nav{
  text-align:center;
  padding:10px;
}
nav a{
  margin:5px;
  text-decoration:none;
  padding:8px 12px;
  background:#16a34a;
  color:#fff;
  border-radius:6px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card p{
  font-size:22px;
  color:#16a34a;
}

/* BOX */
.box{
  margin:20px;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

/* INPUT */
input{
  padding:8px;
  margin:5px;
}

/* BUTTON */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#0F9D58;
  color:#fff;
  cursor:pointer;
}

/* CHART */
.chart-box{height:300px}
canvas{width:100%!important;height:100%!important}

/* PRINT */
@media print{
  nav,button{display:none}
  body{background:#fff}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin") !== "yes"){
  localStorage.setItem("redirectAfterLogin","finance.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h1>Shubhi Education Foundation</h1>
  <p>Under Indian Society Act 1860 Guj./2249/DHD. & Mumbai Public Trust Act 1950 F/2247/DHD</p>
<p>Finance</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="admin.html">Admin</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<!-- CARDS -->
<div class="cards">
<div class="card"><h3>Total</h3><p id="total">₹0</p></div>
<div class="card"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card"><h3>Month</h3><p id="month">₹0</p></div>
<div class="card"><h3>Year</h3><p id="year">₹0</p></div>
<div class="card"><h3>Expenses</h3><p id="expense">₹0</p></div>
<div class="card"><h3>Balance</h3><p id="balance">₹0</p></div>
</div>

<!-- EXPENSE -->
<div class="box">
<h3>➕ Add Expense</h3>
<input id="exp_amt" placeholder="Amount ₹">
<input id="exp_note" placeholder="Note">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<!-- BUTTONS -->
<div style="text-align:center">
<button class="btn" onclick="printReport()">🧾 Print</button>
<button class="btn" onclick="exportCSV()">📁 CSV</button>
</div>

<!-- CHART -->
<div class="box">
<h3>📊 Income vs Expense</h3>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;

async function load(){

// SAFE FETCH
const { data: donations = [] } = await client.from("donations").select("*");

let expenses = [];
try{
  const res = await client.from("expenses").select("*");
  expenses = res.data || [];
}catch(e){
  console.log("No expense table");
}

// CALC
let total=0,today=0,month=0,year=0,exp=0;
let now=new Date();

donations.forEach(d=>{
let a=Number(d.amount)||0;
total+=a;

let dt=new Date(d.created_at);
if(dt.toDateString()===now.toDateString()) today+=a;
if(dt.getMonth()===now.getMonth()) month+=a;
if(dt.getFullYear()===now.getFullYear()) year+=a;
});

expenses.forEach(e=> exp+=Number(e.amount)||0);

// UI
document.getElementById("total").innerText="₹"+total;
document.getElementById("today").innerText="₹"+today;
document.getElementById("month").innerText="₹"+month;
document.getElementById("year").innerText="₹"+year;
document.getElementById("expense").innerText="₹"+exp;
document.getElementById("balance").innerText="₹"+(year-exp);

// CHART
let days=[...Array(7)].map((_,i)=>{
let d=new Date();
d.setDate(d.getDate()-(6-i));
return d.toISOString().split('T')[0];
});

let income=days.map(day=>{
return donations.filter(d=>(d.created_at||"").startsWith(day))
.reduce((s,d)=>s+(Number(d.amount)||0),0);
});

let expData=days.map(day=>{
return expenses.filter(e=>(e.created_at||"").startsWith(day))
.reduce((s,e)=>s+(Number(e.amount)||0),0);
});

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:days.map(d=> new Date(d).toLocaleDateString()),
datasets:[
{label:"Income",data:income,backgroundColor:"#22c55e"},
{label:"Expense",data:expData,backgroundColor:"#ef4444"}
]
},
options:{responsive:true,maintainAspectRatio:false}
});

}

// ADD EXPENSE
async function addExpense(){
let amt=document.getElementById("exp_amt").value;
let note=document.getElementById("exp_note").value;

if(!amt) return alert("Enter amount");

await client.from("expenses").insert([{amount:amt,note:note}]);

alert("Added ✅");
load();
}

// CSV FIXED
async function exportCSV(){
const { data=[] } = await client.from("donations").select("*");

let csv="Name,Amount,Date\n";
data.forEach(d=>{
csv += `${d.name},${d.amount},${d.created_at}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

// PRINT
function printReport(){
window.print();
}

// LOGOUT FIXED
function logout(){
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "index.html";
}
load();
</script>

</body>
</html>
