<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance ERP Ultra - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

.header{
  text-align:center;
  background:#fff;
  padding:20px;
}
.header img{width:60px}

nav{text-align:center;padding:10px;}
nav a{
  margin:5px;
  padding:8px 12px;
  background:#16a34a;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card p{font-size:20px;color:#16a34a}

.box{
  margin:15px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#16a34a;
  color:#fff;
  cursor:pointer;
}

.chart-box{height:260px}

@media print{
  nav,button,input{display:none}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","finance");
  location.href="/login";
}
</script>

<div class="header">
<img src="logo.png">
<h2>Shubhi Education Foundation</h2>
<p>Reg: Guj/2249/DHD | 80G | 12A | CSR</p>
<p>Finance ERP (Audit Ready)</p>
</div>

<nav>
<a href="/">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<div class="box">
<h3>📅 Date Filter</h3>
<input type="date" id="from">
<input type="date" id="to">
<button class="btn" onclick="load()">Apply</button>
</div>

<div class="cards">
<div class="card"><h4>Total Income</h4><p id="income">₹0</p></div>
<div class="card"><h4>Total Expense</h4><p id="expense">₹0</p></div>
<div class="card"><h4>Balance</h4><p id="balance">₹0</p></div>
</div>

<div class="box">
<h3>🤖 AI Insight</h3>
<p id="ai">Calculating...</p>
</div>

<div class="box">
<h3>➕ Add Income</h3>
<input id="inc_amt" placeholder="Amount">
<input id="inc_note" placeholder="Note">
<input type="date" id="inc_date">
<button class="btn" onclick="addIncome()">Add</button>
</div>

<div class="box">
<h3>➖ Add Expense</h3>
<input id="exp_amt" placeholder="Amount">
<input id="exp_note" placeholder="Note">
<input type="date" id="exp_date">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<div class="box">
<h3>📊 Report</h3>
<button class="btn" onclick="printReport()">Print</button>
<button class="btn" onclick="exportCSV()">CSV</button>

<table id="table"></table>
</div>

<div class="box">
<h3>📈 Income vs Expense</h3>
<div class="chart-box"><canvas id="chart"></canvas></div>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

// ─── Logger ──────────────────────────────────────────────────────────────────
function log(level, msg, data) {
  const ts = new Date().toISOString();
  const prefix = `[SEF][finance.html][${ts}]`;
  if (data !== undefined) {
    console[level](`${prefix} ${msg}`, data);
  } else {
    console[level](`${prefix} ${msg}`);
  }
}

// ─── XSS Sanitizer ───────────────────────────────────────────────────────────
function sanitize(str) {
  const div = document.createElement("div");
  div.appendChild(document.createTextNode(String(str ?? "")));
  return div.innerHTML;
}
// ─────────────────────────────────────────────────────────────────────────────

log("info", "Finance page loaded");

let chart;

async function load(){
log("info", "load: fetching finance data");

let from=document.getElementById("from").value;
let to=document.getElementById("to").value;

const { data:don=[], error:e1 } = await client.from("donations").select("*");
const { data:inc=[], error:e2 } = await client.from("income").select("*");
const { data:exp=[], error:e3 } = await client.from("expenses").select("*");

if(e1) log("error", "load: donations fetch error", { message: e1.message });
if(e2) log("error", "load: income fetch error", { message: e2.message });
if(e3) log("error", "load: expenses fetch error", { message: e3.message });

log("info", "load: data received", { donations: don.length, income: inc.length, expenses: exp.length });

function check(d){
  if(!from || !to) return true;
  let dt=new Date(d.created_at).toISOString().split("T")[0];
  return dt>=from && dt<=to;
}

let donations=don.filter(check);
let income=inc.filter(check);
let expense=exp.filter(check);

let totalIncome=0,totalExpense=0;

donations.forEach(d=> totalIncome+=Number(d.amount)||0);
income.forEach(i=> totalIncome+=Number(i.amount)||0);
expense.forEach(e=> totalExpense+=Number(e.amount)||0);

let balance=totalIncome-totalExpense;

document.getElementById("income").innerText="₹"+totalIncome;
document.getElementById("expense").innerText="₹"+totalExpense;
document.getElementById("balance").innerText="₹"+balance;

document.getElementById("ai").innerText =
balance >= 0 ? "📈 Profit ₹"+balance : "⚠️ Loss ₹"+balance;

log("info", "load: stats updated", { totalIncome, totalExpense, balance });

// FIX: use sanitize() on all user data to prevent XSS
let table = document.getElementById("table");

table.innerHTML=`<tr>
<th>Type</th><th>Amount</th><th>Note</th><th>Date</th><th>Action</th>
</tr>`;

donations.forEach(d=>{
table.innerHTML+=`<tr>
<td>Donation</td>
<td>${sanitize(d.amount)}</td>
<td>${sanitize(d.name)}</td>
<td>${new Date(d.created_at).toLocaleDateString()}</td>
<td>-</td>
</tr>`;
});

income.forEach(i=>{
table.innerHTML+=`<tr>
<td>Income</td>
<td>${sanitize(i.amount)}</td>
<td>${sanitize(i.note)}</td>
<td>${new Date(i.created_at).toLocaleDateString()}</td>
<td>
<button class="btn" data-id="${i.id}" onclick="editIncome(this.dataset.id)">Edit</button>
<button class="btn" data-id="${i.id}" onclick="deleteIncome(this.dataset.id)">Delete</button>
</td>
</tr>`;
});

expense.forEach(e=>{
table.innerHTML+=`<tr>
<td>Expense</td>
<td>${sanitize(e.amount)}</td>
<td>${sanitize(e.note)}</td>
<td>${new Date(e.created_at).toLocaleDateString()}</td>
<td>
<button class="btn" data-id="${e.id}" onclick="editExpense(this.dataset.id)">Edit</button>
<button class="btn" data-id="${e.id}" onclick="deleteExpense(this.dataset.id)">Delete</button>
</td>
</tr>`;
});

log("info", "load: table rendered");

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Income","Expense"],
datasets:[{
data:[totalIncome,totalExpense],
backgroundColor:["green","red"]
}]
}
});

}

// ADD
async function addIncome(){
  const amt  = document.getElementById("inc_amt").value;
  const note = document.getElementById("inc_note").value;
  const date = document.getElementById("inc_date").value;
  log("info", "addIncome", { amt, note });
  const { error } = await client.from("income").insert([{
    amount: amt, note: note, created_at: date || new Date()
  }]);
  if(error) log("error", "addIncome failed", { message: error.message });
  else log("info", "addIncome: saved successfully");
  load();
}

async function addExpense(){
  const amt  = document.getElementById("exp_amt").value;
  const note = document.getElementById("exp_note").value;
  const date = document.getElementById("exp_date").value;
  log("info", "addExpense", { amt, note });
  const { error } = await client.from("expenses").insert([{
    amount: amt, note: note, created_at: date || new Date()
  }]);
  if(error) log("error", "addExpense failed", { message: error.message });
  else log("info", "addExpense: saved successfully");
  load();
}

// DELETE
async function deleteIncome(id){
  if(!confirm("Delete this income?")) return;
  log("warn", "deleteIncome", { id });
  await client.from("income").delete().eq("id", id);
  load();
}

async function deleteExpense(id){
  if(!confirm("Delete this expense?")) return;
  log("warn", "deleteExpense", { id });
  await client.from("expenses").delete().eq("id", id);
  load();
}

// EDIT
async function editIncome(id){
  let amt=prompt("New Amount");
  let note=prompt("New Note");
  if(!amt) return;
  log("info", "editIncome", { id, amt, note });
  await client.from("income").update({amount:amt,note:note}).eq("id", id);
  load();
}

async function editExpense(id){
  let amt=prompt("New Amount");
  let note=prompt("New Note");
  if(!amt) return;
  log("info", "editExpense", { id, amt, note });
  await client.from("expenses").update({amount:amt,note:note}).eq("id", id);
  load();
}

// CSV
function exportCSV(){
  log("info", "exportCSV: generating report");
  let rows=document.querySelectorAll("table tr");
  let csv="";
  rows.forEach(r=>{
    let cols=r.querySelectorAll("td,th");
    let row=[];
    cols.forEach(c=>row.push(c.innerText));
    csv+=row.join(",")+"\\n";
  });
  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="report.csv";
  a.click();
}

// PRINT
function printReport(){
  log("info", "printReport: printing");
  window.print();
}

// LOGOUT
function logout(){
  log("info", "logout: clearing session");
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "/";
}

load();
</script>
</body>
</html>
