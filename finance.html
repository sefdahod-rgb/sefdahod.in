<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance ERP Ultimate - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center fixed;
  background-size:cover;
}
.header{text-align:center;background:#fff;padding:15px}
.header img{width:55px}
nav{text-align:center;padding:10px}
nav a{margin:5px;padding:8px 12px;background:#16a34a;color:#fff;border-radius:6px;text-decoration:none}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:12px;border-radius:8px;text-align:center}

.box{margin:10px;background:#fff;padding:12px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

.btn{padding:6px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer}
.chart-box{height:220px}

@media print{nav,button,input{display:none}}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h3>Shubhi Education Foundation</h3>
<p>Ultimate Accounting ERP</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<!-- FILTER -->
<div class="box">
<input type="date" id="from">
<input type="date" id="to">
<button class="btn" onclick="load()">Filter</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Income <br><b id="income">₹0</b></div>
<div class="card">Expense <br><b id="expense">₹0</b></div>
<div class="card">Profit/Loss <br><b id="balance">₹0</b></div>
<div class="card">Cash <br><b id="cash">₹0</b></div>
<div class="card">Bank <br><b id="bank">₹0</b></div>
</div>

<!-- AI -->
<div class="box">
<b id="ai">Loading...</b>
</div>

<!-- DOUBLE ENTRY -->
<div class="box">
<h4>Double Entry Voucher</h4>
<input id="d_acc" placeholder="Debit Account (Cash/Expense)">
<input id="c_acc" placeholder="Credit Account (Donor/Income)">
<input id="amt" placeholder="Amount">
<button class="btn" onclick="addEntry()">Save</button>
</div>

<!-- REPORT -->
<div class="box">
<button class="btn" onclick="print()">Print</button>
<table id="table"></table>
</div>

<!-- CHART -->
<div class="box">
<div class="chart-box"><canvas id="chart"></canvas></div>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;

async function load(){

const { data:entries=[] } = await client.from("entries").select("*");

let income=0, expense=0, cash=0, bank=0;

entries.forEach(e=>{
let amt=Number(e.amount)||0;

// income
if(e.account.toLowerCase().includes("income") && e.type=="CREDIT"){
income+=amt;
}

// expense
if(e.account.toLowerCase().includes("expense") && e.type=="DEBIT"){
expense+=amt;
}

// cash
if(e.account.toLowerCase()=="cash"){
cash += e.type=="DEBIT"?amt:-amt;
}

// bank
if(e.account.toLowerCase()=="bank"){
bank += e.type=="DEBIT"?amt:-amt;
}
});

let balance = income-expense;

document.getElementById("income").innerText="₹"+income;
document.getElementById("expense").innerText="₹"+expense;
document.getElementById("balance").innerText="₹"+balance;
document.getElementById("cash").innerText="₹"+cash;
document.getElementById("bank").innerText="₹"+bank;

document.getElementById("ai").innerText =
balance>=0 ? "📈 Profit ₹"+balance : "⚠️ Loss ₹"+balance;

// TABLE
let table=document.getElementById("table");
table.innerHTML=`<tr>
<th>Account</th><th>Type</th><th>Amount</th>
</tr>`;

entries.forEach(e=>{
table.innerHTML+=`
<tr>
<td>${e.account}</td>
<td>${e.type}</td>
<td>${e.amount}</td>
</tr>`;
});

// CHART
if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Income","Expense"],
datasets:[{data:[income,expense],backgroundColor:["green","red"]}]
}
});

}

// ADD ENTRY
async function addEntry(){

let d=d_acc.value;
let c=c_acc.value;
let a=amt.value;

if(!d||!c||!a) return alert("Fill all");

// debit
await client.from("entries").insert([{
account:d,type:"DEBIT",amount:a
}]);

// credit
await client.from("entries").insert([{
account:c,type:"CREDIT",amount:a
}]);

load();
}

function logout(){
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "index.html";

}

load();
</script>

</body>
</html>
