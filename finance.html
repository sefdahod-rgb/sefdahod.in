/* VOUCHER PRINT */
function printVoucher(type,id){

  let item = null;

  if(type === "donation"){
    item = donationsData.find(d => Number(d.id) === Number(id));
  }

  if(type === "income"){
    item = incomeData.find(i => Number(i.id) === Number(id));
  }

    item = expenseData.find(e => Number(e.id) === Number(id));
  }

    alert("Voucher data not found");
    return;
  }

  let voucherNo =
    type === "donation"
      ? (item.receipt_no || "DN-" + item.id)
      : type === "income"
      ? "IN-" + item.id
      : "EX-" + item.id;

  let gross =
    Number(item.amount || 0);

  let fees =
    Number(item.gateway_fee || 0) +
    Number(item.service_fee || 0) +
    Number(item.gst || 0);

  let net = gross - fees;

  let mode =
    item.mode ||
    (type === "donation" ? "bank" : "cash");

  const win =
    window.open("", "", "width=900,height=800");

  win.document.write(`
    <html>
    <head>
      <title>Voucher</title>
      <style>

        <tr><th>Name/Note</th><td>${item.name || item.note || "-"}</td></tr>
        <tr><th>Mode</th><td>${mode}</td></tr>
        <tr><th>Gross</th><td>₹${gross.toFixed(2)}</td></tr>
        <tr><th>Fees</th><td>₹${fees.toFixed(2)}</td></tr>
        <tr><th>Net</th><td>₹${net.toFixed(2)}</td></tr>

/* CSV */
function exportCSV(){
  let rows = document.querySelectorAll("table tr");
  let csv = "";

  rows.forEach(r=>{
    let cols = r.querySelectorAll("td,th");
    let row = [];
    cols.forEach(c=>row.push(c.innerText));
    csv += row.join(",") + "\n";
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "finance_report.csv";
  a.click();
}
