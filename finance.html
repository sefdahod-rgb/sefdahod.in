<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NGO Finance ERP - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center fixed;
  background-size:cover;
}
.header{text-align:center;background:#fff;padding:15px}
.header img{width:55px}

nav{text-align:center;padding:10px}
nav a{margin:5px;padding:8px 12px;background:#16a34a;color:#fff;border-radius:6px;text-decoration:none}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:12px;border-radius:8px;text-align:center}

.box{margin:10px;background:#fff;padding:12px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

.btn{padding:6px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer}
.chart-box{height:260px}

@media print{
  nav,button,input{display:none}
}
</style>
</head>

<body>
<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","finance.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h3>Shubhi Education Foundation</h3>
<p>Complete NGO Accounting ERP</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<!-- FILTER -->
<div class="box">
<h3>📅 Date Filter</h3>
<input type="date" id="from">
<input type="date" id="to">
<button class="btn" onclick="load()">Apply</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Income <br><b id="income">₹0</b></div>
<div class="card">Expense <br><b id="expense">₹0</b></div>
<div class="card">Profit/Loss <br><b id="balance">₹0</b></div>
<div class="card">Cash <br><b id="cash">₹0</b></div>
<div class="card">Bank <br><b id="bank">₹0</b></div>
</div>

<div class="box">
<h3>🤖 AI Insight</h3>
<p id="ai">Calculating...</p>
</div>

  <!-- OPEN BALANCE -->
<div class="box">
<h3>Opening Balance</h3>
<input id="open_cash" placeholder="Opening_Cash">
<input id="open_bank" placeholder="Opening Bank">
<button class="btn" onclick="saveopening()">Save</button>
</div>
  
<!-- ADD -->
<div class="box">
<h3>➕ Add Income</h3>
<input id="inc_amt" placeholder="Amount">
<input id="inc_note" placeholder="Note">
<input type="date" id="inc_date">
<button class="btn" onclick="addIncome()">Add</button>
</div>

<div class="box">
<h3>➖ Add Expense</h3>
<input id="exp_amt" placeholder="Amount">
<input id="exp_note" placeholder="Note">
<input type="date" id="exp_date">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<!-- REPORT -->
<div class="box">
<h3>📊 Report</h3>
<button class="btn" onclick="printReport()">Print</button>
<button class="btn" onclick="exportCSV()">CSV</button>

<table id="table"></table>
</div>

<!-- CHART -->
<div class="box">
<h3>📈 Monthly Graph</h3>
<div class="chart-box"><canvas id="chart"></canvas></div>
</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;

/* SAVE OPENING BALANCE */
function saveOpening(){

  localStorage.setItem(
    "open_cash",
    document.getElementById("open_cash").value || 0
  );

  localStorage.setItem(
    "open_bank",
    document.getElementById("open_bank").value || 0
  );

  alert("Opening balance saved successfully ✅");

  load();
}

/* LOAD ALL DATA */
async function load(){

  let from =
    document.getElementById("from").value;

  let to =
    document.getElementById("to").value;

  const { data: don = [] } =
    await client
      .from("donations")
      .select("*");

  const { data: inc = [] } =
    await client
      .from("income")
      .select("*");

  const { data: exp = [] } =
    await client
      .from("expenses")
      .select("*");

  /* DATE FILTER */
  function check(d){

    if(!from || !to) return true;

    let dt =
      new Date(d.created_at)
        .toISOString()
        .split("T")[0];

    return dt >= from && dt <= to;
  }

  let donations =
    don.filter(check);

  let income =
    inc.filter(check);

  let expense =
    exp.filter(check);

  /* TOTALS */
  let grossDonation = 0;
  let gatewayFees = 0;
  let serviceFees = 0;
  let gstFees = 0;
  let totalDonationFees = 0;
  let netDonation = 0;

  let manualIncome = 0;
  let totalExpense = 0;

  /* DONATION CALCULATION */
  donations.forEach(d => {

    const gross =
      Number(d.amount) || 0;

    const gateway =
      Number(d.gateway_fee) || 0;

    const service =
      Number(d.service_fee) || 0;

    const gst =
      Number(d.gst) || 0;

    const fees =
      Number(d.total_fees) || 0;

    const net =
      d.net_amount !== null &&
      d.net_amount !== undefined
        ? Number(d.net_amount)
        : gross - fees;

    grossDonation += gross;
    gatewayFees += gateway;
    serviceFees += service;
    gstFees += gst;
    totalDonationFees += fees;
    netDonation += net;

  });

  /* MANUAL INCOME */
  income.forEach(i => {

    manualIncome +=
      Number(i.amount) || 0;

  });

  /* EXPENSE */
  expense.forEach(e => {

    totalExpense +=
      Number(e.amount) || 0;

  });

  /* FINAL TOTAL INCOME */
  let totalIncome =
    netDonation + manualIncome;

  let balance =
    totalIncome - totalExpense;

  /* OPENING BALANCE */
  let openCash =
    Number(
      localStorage.getItem("open_cash")
    ) || 0;

  let openBank =
    Number(
      localStorage.getItem("open_bank")
    ) || 0;

  let cash =
    openCash + balance;

  let bank =
    openBank;

  /* UI UPDATE */
  document.getElementById("income").innerText =
    "₹" + totalIncome.toFixed(2);

  document.getElementById("expense").innerText =
    "₹" + totalExpense.toFixed(2);

  document.getElementById("balance").innerText =
    "₹" + balance.toFixed(2);

  document.getElementById("cash").innerText =
    "₹" + cash.toFixed(2);

  document.getElementById("bank").innerText =
    "₹" + bank.toFixed(2);

  /* AI INSIGHT */
  document.getElementById("ai").innerHTML = `
    Gross Donation: ₹${grossDonation.toFixed(2)} <br>
    Gateway Fee: ₹${gatewayFees.toFixed(2)} <br>
    Service Fee: ₹${serviceFees.toFixed(2)} <br>
    GST: ₹${gstFees.toFixed(2)} <br>
    Total Fees Deducted: ₹${totalDonationFees.toFixed(2)} <br>
    Net Donation Received: ₹${netDonation.toFixed(2)} <br>
    Manual Income: ₹${manualIncome.toFixed(2)} <br>
    Total Expense: ₹${totalExpense.toFixed(2)} <br><br>
    ${
      balance >= 0
        ? "📈 Profit ₹" + balance.toFixed(2)
        : "⚠️ Loss ₹" + Math.abs(balance).toFixed(2)
    }
  `;

  /* TABLE */
  const table =
    document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Type</th>
      <th>Gross Amount</th>
      <th>Fees</th>
      <th>Net Amount</th>
      <th>Note</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  /* DONATIONS */
  donations.forEach(d => {

    const gross =
      Number(d.amount) || 0;

    const fees =
      Number(d.total_fees) || 0;

    const net =
      d.net_amount !== null &&
      d.net_amount !== undefined
        ? Number(d.net_amount)
        : gross - fees;

    table.innerHTML += `
      <tr>
        <td>Donation</td>
        <td>₹${gross.toFixed(2)}</td>
        <td>₹${fees.toFixed(2)}</td>
        <td>₹${net.toFixed(2)}</td>
        <td>${d.name || "-"}</td>
        <td>${new Date(d.created_at).toLocaleDateString()}</td>
        <td>-</td>
      </tr>
    `;

  });

  /* INCOME */
  income.forEach(i => {

    table.innerHTML += `
      <tr>
        <td>Income</td>
        <td>₹${Number(i.amount).toFixed(2)}</td>
        <td>₹0.00</td>
        <td>₹${Number(i.amount).toFixed(2)}</td>
        <td>${i.note || "-"}</td>
        <td>${new Date(i.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="editIncome(${i.id})">Edit</button>
          <button onclick="deleteIncome(${i.id})">Delete</button>
        </td>
      </tr>
    `;

  });

  /* EXPENSE */
  expense.forEach(e => {

    table.innerHTML += `
      <tr>
        <td>Expense</td>
        <td>₹${Number(e.amount).toFixed(2)}</td>
        <td>₹0.00</td>
        <td>₹${Number(e.amount).toFixed(2)}</td>
        <td>${e.note || "-"}</td>
        <td>${new Date(e.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="editExpense(${e.id})">Edit</button>
          <button onclick="deleteExpense(${e.id})">Delete</button>
        </td>
      </tr>
    `;

  });

  /* CHART */
  if(chart) chart.destroy();

  let ctx =
    document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: [
        "Gross Donation",
        "Fees Deducted",
        "Net Donation",
        "Manual Income",
        "Expense"
      ],
      datasets: [{
        data: [
          grossDonation,
          totalDonationFees,
          netDonation,
          manualIncome,
          totalExpense
        ],
        backgroundColor: [
          "green",
          "orange",
          "blue",
          "purple",
          "red"
        ]
      }]
    }
  });

}

/* ADD INCOME */
async function addIncome(){

  await client
    .from("income")
    .insert([{
      amount:
        Number(
          document.getElementById("inc_amt").value
        ),
      note:
        document.getElementById("inc_note").value,
      created_at:
        document.getElementById("inc_date").value || new Date()
    }]);

  load();
}

/* ADD EXPENSE */
async function addExpense(){

  await client
    .from("expenses")
    .insert([{
      amount:
        Number(
          document.getElementById("exp_amt").value
        ),
      note:
        document.getElementById("exp_note").value,
      created_at:
        document.getElementById("exp_date").value || new Date()
    }]);

  load();
}

/* DELETE */
async function deleteIncome(id){

  await client
    .from("income")
    .delete()
    .eq("id", id);

  load();
}

async function deleteExpense(id){

  await client
    .from("expenses")
    .delete()
    .eq("id", id);

  load();
}

/* EDIT */
async function editIncome(id){

  let a =
    prompt("Enter new income amount:");

  if(a){

    await client
      .from("income")
      .update({
        amount: Number(a)
      })
      .eq("id", id);

    load();
  }
}

async function editExpense(id){

  let a =
    prompt("Enter new expense amount:");

  if(a){

    await client
      .from("expenses")
      .update({
        amount: Number(a)
      })
      .eq("id", id);

    load();
  }
}

/* EXPORT CSV */
function exportCSV(){

  let rows =
    document.querySelectorAll("table tr");

  let csv = "";

  rows.forEach(r => {

    let cols =
      r.querySelectorAll("td,th");

    let row = [];

    cols.forEach(c =>
      row.push(c.innerText)
    );

    csv +=
      row.join(",") + "\n";

  });

  let blob =
    new Blob([csv]);

  let a =
    document.createElement("a");

  a.href =
    URL.createObjectURL(blob);

  a.download =
    "finance_report.csv";

  a.click();
}

/* PRINT */
function printReport(){
  window.print();
}

/* LOGOUT */
function logout(){

  localStorage.clear();

  alert("Logged out successfully ✅");

  window.location.href =
    "index.html";
}

/* START */
load();
</script>
