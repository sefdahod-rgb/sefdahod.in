<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance Pro Max - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(rgba(240,253,244,0.9),rgba(240,253,244,0.9)),
              url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.header{
  text-align:center;
  background:#ffffff;
  padding:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.header img{width:80px}
.header h1{margin:5px;color:#065f46}

/* NAV */
nav{
  text-align:center;
  padding:10px;
}
nav a{
  margin:5px;
  text-decoration:none;
  padding:8px 12px;
  background:#16a34a;
  color:#fff;
  border-radius:6px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}
.card p{
  font-size:22px;
  color:#16a34a;
}

/* BOX */
.box{
  margin:20px;
  background:#fff;
  padding:20px;
  border-radius:12px;
  overflow:hidden;
}

/* CHART FIX */
.chart-box{
  height:280px;
}
canvas{
  width:100%!important;
  height:100%!important;
}

/* BUTTON */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#0F9D58;
  color:#fff;
  cursor:pointer;
}

/* PRINT */
@media print{
  nav,button{display:none}
  body{background:#fff}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin") !== "yes"){
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h1>Shubhi Education Foundation</h1>
<p>Finance Dashboard (CA Audit Ready)</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="admin.html">Admin</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<div class="cards">
<div class="card"><h3>Total</h3><p id="total">₹0</p></div>
<div class="card"><h3>Today</h3><p id="today">₹0</p></div>
<div class="card"><h3>Month</h3><p id="month">₹0</p></div>
<div class="card"><h3>Year</h3><p id="year">₹0</p></div>
<div class="card"><h3>Expenses</h3><p id="expense">₹0</p></div>
<div class="card"><h3>Balance</h3><p id="balance">₹0</p></div>
</div>

<div style="text-align:center">
<button class="btn" onclick="printReport()">🧾 Print Report</button>
</div>

<div class="box">
<h3>📊 Last 7 Days</h3>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;

async function load(){

// DONATIONS
const { data } = await client.from("donations").select("*");

// EXPENSES
const { data: exp } = await client.from("expenses").select("*");

let total=0,today=0,month=0,year=0,expense=0;
let now=new Date();

data.forEach(d=>{
let amt=Number(d.amount)||0;
total+=amt;

let dt=new Date(d.created_at);

if(dt.toDateString()===now.toDateString()) today+=amt;
if(dt.getMonth()===now.getMonth()) month+=amt;
if(dt.getFullYear()===now.getFullYear()) year+=amt;
});

exp.forEach(e=> expense+=Number(e.amount)||0);

// SET VALUES
document.getElementById("total").innerText="₹"+total;
document.getElementById("today").innerText="₹"+today;
document.getElementById("month").innerText="₹"+month;
document.getElementById("year").innerText="₹"+year;
document.getElementById("expense").innerText="₹"+expense;
document.getElementById("balance").innerText="₹"+(year-expense);

// CHART
let days=[...Array(7)].map((_,i)=>{
let d=new Date();
d.setDate(d.getDate()-(6-i));
return d.toISOString().split('T')[0];
});

let totals=days.map(day=>{
return data.filter(d=>(d.created_at||"").startsWith(day))
.reduce((s,d)=>s+(Number(d.amount)||0),0);
});

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:days,
datasets:[{
data:totals,
borderColor:"#16a34a",
backgroundColor:"rgba(34,197,94,0.2)",
fill:true
}]
}
});

}

function printReport(){
window.print();
}

function logout(){
localStorage.clear();
window.location.href="index.html";
}

load();
</script>

</body>
</html>
