<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NGO Finance ERP - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center fixed;
  background-size:cover;
}
.header{text-align:center;background:#fff;padding:15px}
.header img{width:55px}

nav{text-align:center;padding:10px}
nav a{margin:5px;padding:8px 12px;background:#16a34a;color:#fff;border-radius:6px;text-decoration:none}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:12px;border-radius:8px;text-align:center}

.box{margin:10px;background:#fff;padding:12px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

.btn{padding:6px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer}
.chart-box{height:260px}

@media print{
  nav,button,input{display:none}
}
</style>
</head>

<body>
<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","finance.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h3>Shubhi Education Foundation</h3>
<p>Complete NGO Accounting ERP</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<!-- FILTER -->
<div class="box">
<h3>📅 Date Filter</h3>
<input type="date" id="from">
<input type="date" id="to">
<button class="btn" onclick="load()">Apply</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Income <br><b id="income">₹0</b></div>
<div class="card">Expense <br><b id="expense">₹0</b></div>
<div class="card">Profit/Loss <br><b id="balance">₹0</b></div>
<div class="card">Cash <br><b id="cash">₹0</b></div>
<div class="card">Bank <br><b id="bank">₹0</b></div>
</div>

<div class="box">
<h3>🤖 AI Insight</h3>
<p id="ai">Calculating...</p>
</div>

  <!-- OPENING BALANCE -->
<div class="box">
  <h3>Opening Balance</h3>

  <input 
    type="number"
    id="open_cash" 
    placeholder="Opening Cash"
  >

  <input 
    type="number"
    id="open_bank" 
    placeholder="Opening Bank"
  >

  <button class="btn" onclick="saveOpening()">
    Save Opening Balance
  </button>
</div>

<!-- ADD INCOME -->
<div class="box">
  <h3>➕ Add Income</h3>

  <input 
    type="number"
    id="inc_amt" 
    placeholder="Amount"
  >

  <input 
    type="text"
    id="inc_note" 
    placeholder="Note"
  >

  <input 
    type="date"
    id="inc_date"
  >

  <select id="inc_mode">
    <option value="cash">Cash</option>
    <option value="bank">Bank</option>
  </select>

  <button class="btn" onclick="addIncome()">
    Add Income
  </button>
</div>

<!-- ADD EXPENSE -->
<div class="box">
  <h3>➖ Add Expense</h3>

  <input 
    type="number"
    id="exp_amt" 
    placeholder="Amount"
  >

  <input 
    type="text"
    id="exp_note" 
    placeholder="Note"
  >

  <input 
    type="date"
    id="exp_date"
  >

  <select id="exp_mode">
    <option value="cash">Cash</option>
    <option value="bank">Bank</option>
  </select>

  <button class="btn" onclick="addExpense()">
    Add Expense
  </button>
</div>

<!-- REPORT -->
<div class="box">
<h3>📊 Report</h3>
<button class="btn" onclick="printReport()">Print</button>
<button class="btn" onclick="exportCSV()">CSV</button>

<table id="table"></table>
</div>

<!-- CHART -->
<div class="box">
<h3>📈 Monthly Graph</h3>
<div class="chart-box"><canvas id="chart"></canvas></div>
</div>

<script>
const client = supabase.createClient(
  "https://kqahcvaoxnmxfcgyyync.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);


let chart;

/* OPENING BALANCE */
function saveOpening() {
  localStorage.setItem("open_cash",
    document.getElementById("open_cash").value || 0
  );

  localStorage.setItem("open_bank",
    document.getElementById("open_bank").value || 0
  );

  alert("Opening balance saved successfully ✅");
  load();
}

function editOpening() {
  document.getElementById("open_cash").value =
    localStorage.getItem("open_cash") || 0;

  document.getElementById("open_bank").value =
    localStorage.getItem("open_bank") || 0;
}

function deleteOpening() {
  localStorage.removeItem("open_cash");
  localStorage.removeItem("open_bank");

  document.getElementById("open_cash").value = "";
  document.getElementById("open_bank").value = "";

  alert("Opening balance deleted ✅");
  load();
}

/* ADD INCOME */
async function addIncome() {

  const amount =
    Number(document.getElementById("inc_amt").value);

  const note =
    document.getElementById("inc_note").value;

  const created_at =
    document.getElementById("inc_date").value ||
    new Date().toISOString();

  const mode =
    document.getElementById("inc_mode").value;

  if(!amount || amount <= 0){
    alert("Enter valid income amount");
    return;
  }

  const { error } =
    await client.from("income").insert([{
      amount,
      note,
      mode,
      created_at
    }]);

  if(error){
    alert("Income add failed: " + error.message);
    return;
  }

  alert("Income added successfully ✅");

  document.getElementById("inc_amt").value = "";
  document.getElementById("inc_note").value = "";
  document.getElementById("inc_date").value = "";

  load();
}

/* ADD EXPENSE */
async function addExpense() {

  const amount =
    Number(document.getElementById("exp_amt").value);

  const note =
    document.getElementById("exp_note").value;

  const created_at =
    document.getElementById("exp_date").value ||
    new Date().toISOString();

  const mode =
    document.getElementById("exp_mode").value;

  if(!amount || amount <= 0){
    alert("Enter valid expense amount");
    return;
  }

  const { error } =
    await client.from("expenses").insert([{
      amount,
      note,
      mode,
      created_at
    }]);

  if(error){
    alert("Expense add failed: " + error.message);
    return;
  }

  alert("Expense added successfully ✅");

  document.getElementById("exp_amt").value = "";
  document.getElementById("exp_note").value = "";
  document.getElementById("exp_date").value = "";

  load();
}

/* LOAD */
async function load() {

  const from =
    document.getElementById("from").value;

  const to =
    document.getElementById("to").value;

  const modeFilter =
    document.getElementById("modeFilter")?.value || "all";

  const { data: don = [] } =
    await client.from("donations").select("*");

  const { data: inc = [] } =
    await client.from("income").select("*");

  const { data: exp = [] } =
    await client.from("expenses").select("*");

  function checkDate(d){
    if(!from || !to) return true;

    const dt =
      new Date(d.created_at)
      .toISOString()
      .split("T")[0];

    return dt >= from && dt <= to;
  }

  const donations = don.filter(checkDate);

  let income = inc.filter(checkDate);
  let expense = exp.filter(checkDate);

  if(modeFilter === "cash"){
    income = income.filter(i => (i.mode || "cash") === "cash");
    expense = expense.filter(e => (e.mode || "cash") === "cash");
  }

  if(modeFilter === "bank"){
    income = income.filter(i => (i.mode || "cash") === "bank");
    expense = expense.filter(e => (e.mode || "cash") === "bank");
  }

  let grossDonation = 0;
  let totalFees = 0;
  let netDonation = 0;

  let cashIncome = 0;
  let bankIncome = 0;

  let cashExpense = 0;
  let bankExpense = 0;

  /* DONATIONS */
  if(modeFilter !== "cash"){
    donations.forEach(d => {

      const gross = Number(d.amount) || 0;

      const fees =
        Number(d.gateway_fee || 0) +
        Number(d.service_fee || 0) +
        Number(d.gst || 0);

      const net =
        gross - fees;

      grossDonation += gross;
      totalFees += fees;
      netDonation += net;

      bankIncome += net;
    });
  }

  /* INCOME */
  income.forEach(i => {
    const amt = Number(i.amount) || 0;

    if((i.mode || "cash") === "bank"){
      bankIncome += amt;
    } else {
      cashIncome += amt;
    }
  });

  /* EXPENSE */
  expense.forEach(e => {
    const amt = Number(e.amount) || 0;

    if((e.mode || "cash") === "bank"){
      bankExpense += amt;
    } else {
      cashExpense += amt;
    }
  });

  /* OPENING */
  const openCash =
    Number(localStorage.getItem("open_cash")) || 0;

  const openBank =
    Number(localStorage.getItem("open_bank")) || 0;

  const finalCash =
    openCash + cashIncome - cashExpense;

  const finalBank =
    openBank + bankIncome - bankExpense;

  const totalIncome =
    cashIncome + bankIncome;

  const totalExpense =
    cashExpense + bankExpense;

  const profitLoss =
    totalIncome - totalExpense;

  const totalFund =
    finalCash + finalBank;

  /* UI */
  income.innerText = "₹" + totalIncome.toFixed(2);
  expense.innerText = "₹" + totalExpense.toFixed(2);
  balance.innerText = "₹" + profitLoss.toFixed(2);
  cash.innerText = "₹" + finalCash.toFixed(2);
  bank.innerText = "₹" + finalBank.toFixed(2);

  /* AI */
  ai.innerHTML = `
    Gross Donation: ₹${grossDonation.toFixed(2)}<br>
    Total Fees: ₹${totalFees.toFixed(2)}<br>
    Net Donation: ₹${netDonation.toFixed(2)}<br><br>

    Cash Income: ₹${cashIncome.toFixed(2)}<br>
    Bank Income: ₹${bankIncome.toFixed(2)}<br><br>

    Cash Expense: ₹${cashExpense.toFixed(2)}<br>
    Bank Expense: ₹${bankExpense.toFixed(2)}<br><br>

    Opening Cash: ₹${openCash.toFixed(2)}<br>
    Opening Bank: ₹${openBank.toFixed(2)}<br><br>

    Final Cash: ₹${finalCash.toFixed(2)}<br>
    Final Bank: ₹${finalBank.toFixed(2)}<br>

    Total Fund: ₹${totalFund.toFixed(2)}<br><br>

    ${
      profitLoss >= 0
        ? "📈 Profit ₹" + profitLoss.toFixed(2)
        : "⚠️ Loss ₹" + Math.abs(profitLoss).toFixed(2)
    }
  `;

  /* TABLE */
  table.innerHTML = `
    <tr>
      <th>Voucher</th>
      <th>Type</th>
      <th>Gross</th>
      <th>Fees</th>
      <th>Net</th>
      <th>Mode</th>
      <th>Note</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  let voucherNo = 1;

  donations.forEach(d => {

    const gross = Number(d.amount) || 0;

    const fees =
      Number(d.gateway_fee || 0) +
      Number(d.service_fee || 0) +
      Number(d.gst || 0);

    const net = gross - fees;

    table.innerHTML += `
      <tr>
        <td>V-${voucherNo++}</td>
        <td>Donation</td>
        <td>₹${gross.toFixed(2)}</td>
        <td>₹${fees.toFixed(2)}</td>
        <td>₹${net.toFixed(2)}</td>
        <td>Bank</td>
        <td>${d.name || "-"}</td>
        <td>${new Date(d.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="printVoucher('Donation','${d.name}','${gross}','${fees}','${net}','Bank')">Voucher</button>
        </td>
      </tr>
    `;
  });

  income.forEach(i => {
    table.innerHTML += `
      <tr>
        <td>V-${voucherNo++}</td>
        <td>Income</td>
        <td>₹${Number(i.amount).toFixed(2)}</td>
        <td>₹0.00</td>
        <td>₹${Number(i.amount).toFixed(2)}</td>
        <td>${i.mode || "cash"}</td>
        <td>${i.note || "-"}</td>
        <td>${new Date(i.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="editIncome(${i.id})">Edit</button>
          <button onclick="deleteIncome(${i.id})">Delete</button>
          <button onclick="printVoucher('Income','${i.note}','${i.amount}','0','${i.amount}','${i.mode}')">Voucher</button>
        </td>
      </tr>
    `;
  });

  expense.forEach(e => {
    table.innerHTML += `
      <tr>
        <td>V-${voucherNo++}</td>
        <td>Expense</td>
        <td>₹${Number(e.amount).toFixed(2)}</td>
        <td>₹0.00</td>
        <td>₹${Number(e.amount).toFixed(2)}</td>
        <td>${e.mode || "cash"}</td>
        <td>${e.note || "-"}</td>
        <td>${new Date(e.created_at).toLocaleDateString()}</td>
        <td>
          <button onclick="editExpense(${e.id})">Edit</button>
          <button onclick="deleteExpense(${e.id})">Delete</button>
          <button onclick="printVoucher('Expense','${e.note}','${e.amount}','0','${e.amount}','${e.mode}')">Voucher</button>
        </td>
      </tr>
    `;
  });

  /* CHART */
  if(chart) chart.destroy();

  chart = new Chart(
    document.getElementById("chart"),
    {
      type: "bar",
      data: {
        labels: [
          "Cash Income",
          "Bank Income",
          "Cash Expense",
          "Bank Expense"
        ],
        datasets: [{
          data: [
            cashIncome,
            bankIncome,
            cashExpense,
            bankExpense
          ],
          backgroundColor: [
            "green",
            "blue",
            "orange",
            "red"
          ]
        }]
      }
    }
  );
}

/* VOUCHER */
function printVoucher(type,note,gross,fees,net,mode){
  const win = window.open("", "_blank");

  win.document.write(`
    <h2>Shubhi Education Foundation Voucher</h2>
    <p>Type: ${type}</p>
    <p>Note: ${note}</p>
    <p>Gross: ₹${gross}</p>
    <p>Fees: ₹${fees}</p>
    <p>Net: ₹${net}</p>
    <p>Mode: ${mode}</p>
    <p>Date: ${new Date().toLocaleString()}</p>
    <hr>
    <p>Authorized Signature</p>
  `);

  win.print();
}

/* DELETE */
async function deleteIncome(id){
  await client.from("income").delete().eq("id", id);
  load();
}

async function deleteExpense(id){
  await client.from("expenses").delete().eq("id", id);
  load();
}

/* EDIT */
async function editIncome(id){
  let a = prompt("Enter new income amount:");
  if(a){
    await client.from("income")
      .update({ amount: Number(a) })
      .eq("id", id);
    load();
  }
}

async function editExpense(id){
  let a = prompt("Enter new expense amount:");
  if(a){
    await client.from("expenses")
      .update({ amount: Number(a) })
      .eq("id", id);
    load();
  }
}

/* CSV */
function exportCSV(){
  let rows = document.querySelectorAll("table tr");
  let csv = "";

  rows.forEach(r => {
    let cols = r.querySelectorAll("td,th");
    let row = [];

    cols.forEach(c => row.push(c.innerText));

    csv += row.join(",") + "\n";
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "finance_report.csv";
  a.click();
}

/* PRINT */
function printReport(){
  window.print();
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "index.html";
}

/* START */
load();
</script>
