<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance ERP Ultra - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

.header{
  text-align:center;
  background:#fff;
  padding:20px;
}
.header img{width:60px}

nav{text-align:center;padding:10px;}
nav a{
  margin:5px;
  padding:8px 12px;
  background:#16a34a;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card p{font-size:20px;color:#16a34a}

.box{
  margin:15px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#16a34a;
  color:#fff;
  cursor:pointer;
}

.chart-box{height:260px}

@media print{
  nav,button,input{display:none}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","finance.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h2>Shubhi Education Foundation</h2>
<p>Reg: Guj/2249/DHD | 80G | 12A | CSR</p>
<p>Finance ERP (Audit Ready)</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<div class="box">
<input type="date" id="date">
<input id="debit" placeholder="Debit Account">
<input id="credit" placeholder="Credit Account">
<input id="amount" placeholder="Amount">
<input id="note" placeholder="Note">
<button class="btn" onclick="saveVoucher()">Save Voucher</button>
</div>

<div class="box">
<h3>Balances</h3>
<p>Cash: ₹<span id="cash">0</span></p>
<p>Bank: ₹<span id="bank">0</span></p>
<p>Income: ₹<span id="income">0</span></p>
<p>Expense: ₹<span id="expense">0</span></p>
<p><b>Profit/Loss: ₹<span id="pl">0</span></b></p>
</div>

<div class="box">
<h3>Voucher Report</h3>
<table id="tbl"></table>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);


async function saveVoucher(){

let date=document.getElementById("date").value;
let d=document.getElementById("debit").value;
let c=document.getElementById("credit").value;
let amt=document.getElementById("amount").value;
let note=document.getElementById("note").value;

// AUTO VOUCHER NO
let { data:all=[] } = await client.from("vouchers").select("*");
let vNo="V"+(all.length+1);
let rNo="R"+(all.length+1);

// SAVE VOUCHER
let { data:voucher } = await client.from("vouchers").insert([{
voucher_no:vNo,
receipt_no:rNo,
date:date,
note:note
}]).select().single();

// DOUBLE ENTRY
await client.from("entries").insert([
{voucher_id:voucher.id,account:d,type:"DEBIT",amount:amt},
{voucher_id:voucher.id,account:c,type:"CREDIT",amount:amt}
]);

alert("Saved ✅ Voucher No: "+vNo);
load();
}

async function load(){

let { data:entries=[] } = await client.from("entries").select("*");
let { data:vouchers=[] } = await client.from("vouchers").select("*");

let cash=0,bank=0,income=0,expense=0;

// CALCULATION
entries.forEach(e=>{
let amt=Number(e.amount)||0;

if(e.account=="Cash"){
cash += e.type=="DEBIT"?amt:-amt;
}

if(e.account=="Bank"){
bank += e.type=="DEBIT"?amt:-amt;
}

if(e.account=="Income" && e.type=="CREDIT"){
income+=amt;
}

if(e.account=="Expense" && e.type=="DEBIT"){
expense+=amt;
}
});

document.getElementById("cash").innerText=cash;
document.getElementById("bank").innerText=bank;
document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("pl").innerText=(income-expense);

// TABLE
let tbl=document.getElementById("tbl");
tbl.innerHTML="<tr><th>Voucher</th><th>Date</th><th>Note</th></tr>";

vouchers.forEach(v=>{
tbl.innerHTML+=`
<tr>
<td>${v.voucher_no}</td>
<td>${v.date}</td>
<td>${v.note}</td>
</tr>`;
});

}
// PRINT
function printReport(){window.print();}

// LOGOUT

function logout(){
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "index.html";
}
load();
</script>
</body>
</html>
