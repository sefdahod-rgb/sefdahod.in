<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NGO Finance ERP - SEF Dahod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(240,253,244,0.95),rgba(240,253,244,0.95)),
             url('bg.jpg') no-repeat center fixed;
  background-size:cover;
}
.header{text-align:center;background:#fff;padding:15px}
.header img{width:55px}

nav{text-align:center;padding:10px}
nav a{margin:5px;padding:8px 12px;background:#16a34a;color:#fff;border-radius:6px;text-decoration:none}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:12px;border-radius:8px;text-align:center}

.box{margin:10px;background:#fff;padding:12px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #ddd}
th{background:#16a34a;color:#fff}

.btn{padding:6px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer}
.chart-box{height:260px}

@media print{
  nav,button,input{display:none}
}
</style>
</head>

<body>
<script>
if(localStorage.getItem("isAdmin")!=="yes"){
  localStorage.setItem("redirectAfterLogin","finance.html");
  location.href="login.html";
}
</script>

<div class="header">
<img src="logo.png">
<h3>Shubhi Education Foundation</h3>
<p>Complete NGO Accounting ERP</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

<!-- FILTER -->
<div class="box">
<h3>📅 Date Filter</h3>
<input type="date" id="from">
<input type="date" id="to">
<button class="btn" onclick="load()">Apply</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Income <br><b id="income">₹0</b></div>
<div class="card">Expense <br><b id="expense">₹0</b></div>
<div class="card">Profit/Loss <br><b id="balance">₹0</b></div>
<div class="card">Cash <br><b id="cash">₹0</b></div>
<div class="card">Bank <br><b id="bank">₹0</b></div>
</div>

<!-- AI -->
<div class="box">
<b id="ai">AI Loading...</b>
</div>

<!-- ADD -->
<div class="box">
<h3>➕ Add Income</h3>
<input id="inc_amt" placeholder="Amount">
<input id="inc_note" placeholder="Note">
<input type="date" id="inc_date">
<button class="btn" onclick="addIncome()">Add</button>
</div>

<div class="box">
<h3>➖ Add Expense</h3>
<input id="exp_amt" placeholder="Amount">
<input id="exp_note" placeholder="Note">
<input type="date" id="exp_date">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<!-- REPORT -->
<div class="box">
<h3>📊 Report</h3>
<button class="btn" onclick="printReport()">Print</button>
<button class="btn" onclick="exportCSV()">CSV</button>

<table id="table"></table>
</div>

<!-- CHART -->
<div class="box">
<h3>📈 Monthly Graph</h3>
<div class="chart-box"><canvas id="chart"></canvas></div>
</div>

<script>
const client = supabase.createClient(
"https://kqahcvaoxnmxfcgyyync.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYWhjdmFveG5teGZjZ3l5eW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQ3NTksImV4cCI6MjA5MDQ2MDc1OX0.H_aABgpGglAMnVaDkBZU7xihvhHW8XT3U9PoR2VsFWg"
);

let chart;

async function load(){

let from=document.getElementById("from").value;
let to=document.getElementById("to").value;

const { data:don=[] } = await client.from("donations").select("*");
const { data:inc=[] } = await client.from("income").select("*");
const { data:exp=[] } = await client.from("expenses").select("*");

function check(d){
  if(!from || !to) return true;
  let dt=new Date(d.created_at).toISOString().split("T")[0];
  return dt>=from && dt<=to;
}

let donations=don.filter(check);
let income=inc.filter(check);
let expense=exp.filter(check);

let totalIncome=0,totalExpense=0;
let cash=0,bank=0;

// CALC
donations.forEach(d=> totalIncome+=Number(d.amount)||0);
income.forEach(i=> totalIncome+=Number(i.amount)||0);
expense.forEach(e=> totalExpense+=Number(e.amount)||0);

// CASH/BANK LOGIC (simple split)
cash = totalIncome * 0.6 - totalExpense * 0.5;
bank = totalIncome - cash;

let balance=totalIncome-totalExpense;

// UI
incomeEl.innerText="₹"+totalIncome;
expenseEl.innerText="₹"+totalExpense;
balanceEl.innerText="₹"+balance;
cashEl.innerText="₹"+cash;
bankEl.innerText="₹"+bank;

// AI
ai.innerText = balance>=0 
? "📈 Profit ₹"+balance 
: "⚠️ Loss ₹"+balance;

// TABLE
table.innerHTML=`<tr>
<th>Type</th><th>Amount</th><th>Note</th><th>Date</th><th>Action</th>
</tr>`;

donations.forEach(d=>{
table.innerHTML+=`<tr>
<td>Donation</td>
<td>${d.amount}</td>
<td>${d.name}</td>
<td>${new Date(d.created_at).toLocaleDateString()}</td>
<td>-</td></tr>`;
});

income.forEach(i=>{
table.innerHTML+=`<tr>
<td>Income</td>
<td>${i.amount}</td>
<td>${i.note}</td>
<td>${new Date(i.created_at).toLocaleDateString()}</td>
<td>
<button onclick="editIncome(${i.id})">Edit</button>
<button onclick="deleteIncome(${i.id})">Delete</button>
</td></tr>`;
});

expense.forEach(e=>{
table.innerHTML+=`<tr>
<td>Expense</td>
<td>${e.amount}</td>
<td>${e.note}</td>
<td>${new Date(e.created_at).toLocaleDateString()}</td>
<td>
<button onclick="editExpense(${e.id})">Edit</button>
<button onclick="deleteExpense(${e.id})">Delete</button>
</td></tr>`;
});

// GRAPH (Monthly)
let months={};
[...donations,...income,...expense].forEach(x=>{
let m=new Date(x.created_at).getMonth();
months[m]=(months[m]||0)+Number(x.amount||0);
});

if(chart) chart.destroy();

chart=new Chart(chartEl,{
type:"line",
data:{
labels:Object.keys(months),
datasets:[{data:Object.values(months)}]
}
});

}

// ADD
async function addIncome(){
await client.from("income").insert([{
amount:inc_amt.value,
note:inc_note.value,
created_at:inc_date.value || new Date()
}]);
load();
}

async function addExpense(){
await client.from("expenses").insert([{
amount:exp_amt.value,
note:exp_note.value,
created_at:exp_date.value || new Date()
}]);
load();
}

// EDIT DELETE
async function deleteIncome(id){
await client.from("income").delete().eq("id",id); load();
}
async function deleteExpense(id){
await client.from("expenses").delete().eq("id",id); load();
}

async function editIncome(id){
let a=prompt("Amount");
await client.from("income").update({amount:a}).eq("id",id); load();
}
async function editExpense(id){
let a=prompt("Amount");
await client.from("expenses").update({amount:a}).eq("id",id); load();
}

// CSV
function exportCSV(){
let rows=document.querySelectorAll("table tr");
let csv="";
rows.forEach(r=>{
let cols=r.querySelectorAll("td,th");
let row=[];
cols.forEach(c=>row.push(c.innerText));
csv+=row.join(",")+"\\n";
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

// PRINT
function printReport(){window.print();}

// LOGOUT
function logout(){
  localStorage.clear();
  alert("Logged out successfully ✅");
  window.location.href = "index.html";

}

load();
</script>

</body>
</html>
