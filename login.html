<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(135deg,#004080,#0F9D58);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#0F9D58;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0c7c45;
}

#msg{
  color:red;
  font-size:13px;
}
</style>

</head>

<body>

<div class="login-box">

  <h2>Admin Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>

</div>

<script>

<script>
function login(){

  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  console.log("User:", u);
  console.log("Pass:", p);

  if(u === "admin" && p === "admin123"){

    localStorage.setItem("isAdmin","yes");

    alert("Login Success");
    window.location.href = "admin.html";

  } else {
    document.getElementById("msg").innerText = "Invalid login";
  }
}
</script>

</script>

</body>
</html>
