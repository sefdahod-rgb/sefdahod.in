<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(135deg,#004080,#0F9D58);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#0F9D58;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0c7f47;
}

.link{
  margin-top:10px;
  display:block;
  color:#0F9D58;
  cursor:pointer;
  font-size:14px;
}

#msg{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <form onsubmit="login(event)">
    <input id="user" placeholder="Username" required>
    <input id="pass" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <span class="link" onclick="forgot()">Forgot Password?</span>

  <p id="msg"></p>
</div>

<script>

// 🔐 DEFAULT + SECRET
const DEFAULT_USER = "admin";
const DEFAULT_PASS = "admin123";
const SECRET_CODE = "SEF2026"; // change this

// LOGIN
function login(e){
  e.preventDefault();

  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  let savedPass = localStorage.getItem("adminPass") || DEFAULT_PASS;

  if(u === DEFAULT_USER && p === savedPass){

    localStorage.setItem("isAdmin","yes");

    // 🔥 last page check
    let go = localStorage.getItem("redirectAfterLogin") || "admin.html";

    window.location.href = go;

  } else {
    document.getElementById("msg").innerText = "Invalid login";
  }
}

// 🔁 FORGOT PASSWORD
function forgot(){

  let code = prompt("Enter Secret Code");

  if(code !== SECRET_CODE){
    alert("Wrong Secret Code ❌");
    return;
  }

  let newPass = prompt("Enter New Password");

  if(!newPass || newPass.length < 4){
    alert("Password must be at least 4 characters");
    return;
  }

  localStorage.setItem("adminPass", newPass);

  alert("✅ Password Changed Successfully");
}

</script>

</body>
</html>
