<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(135deg,#004080,#0F9D58);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#0F9D58;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

#msg{
  color:red;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <form onsubmit="login(event)">
    <input id="user" placeholder="Username" required>
    <input id="pass" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p id="msg"></p>
</div>

<script>
function login(e){
  e.preventDefault();

  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  if(u === "admin" && p === "admin123"){
    localStorage.setItem("isAdmin","yes");

    setTimeout(()=>{
      window.location.href = "admin.html";
    },200);

  } else {
    document.getElementById("msg").innerText = "Invalid login";
  }
}
</script>

</body>
</html>
