<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(135deg,#004080,#0F9D58);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#0F9D58;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0c7f47;
}

.link{
  margin-top:10px;
  display:block;
  color:#0F9D58;
  cursor:pointer;
  font-size:14px;
}

#msg{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <form onsubmit="login(event)">
    <input id="user" placeholder="Username" required>
    <input id="pass" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <span class="link" onclick="forgot()">Forgot Password?</span>

  <p id="msg"></p>
</div>

<script>

// ─── Logger ──────────────────────────────────────────────────────────────────
function log(level, msg, data) {
  const ts = new Date().toISOString();
  const prefix = `[SEF][login.html][${ts}]`;
  if (data !== undefined) {
    console[level](`${prefix} ${msg}`, data);
  } else {
    console[level](`${prefix} ${msg}`);
  }
}
// ─────────────────────────────────────────────────────────────────────────────

log("info", "Login page loaded");

// ⚠️ SECURITY NOTE: This login is client-side only. The password and secret
// code are stored in localStorage and source code — visible to anyone who
// opens DevTools. For real security, replace with Supabase Auth or a
// serverless function that validates credentials server-side.

// 🔐 DEFAULT + SECRET
const DEFAULT_USER = "admin";
const DEFAULT_PASS = "admin123";
const SECRET_CODE  = "SEF2026"; // change this

// ✅ BRUTE-FORCE PROTECTION
const MAX_ATTEMPTS = 5;
const LOCKOUT_MINUTES = 10;

function isLockedOut() {
  const lockUntil = parseInt(localStorage.getItem("loginLockUntil") || "0");
  return Date.now() < lockUntil;
}

function getRemainingLockMinutes() {
  const lockUntil = parseInt(localStorage.getItem("loginLockUntil") || "0");
  return Math.ceil((lockUntil - Date.now()) / 60000);
}

function recordFailedAttempt() {
  let attempts = parseInt(localStorage.getItem("loginAttempts") || "0") + 1;
  localStorage.setItem("loginAttempts", attempts);
  log("warn", "Failed login attempt", { attempt: attempts, max: MAX_ATTEMPTS });

  if (attempts >= MAX_ATTEMPTS) {
    const lockUntil = Date.now() + LOCKOUT_MINUTES * 60 * 1000;
    localStorage.setItem("loginLockUntil", lockUntil);
    log("warn", "Account locked out", { lockMinutes: LOCKOUT_MINUTES });
  }
}

function clearFailedAttempts() {
  localStorage.removeItem("loginAttempts");
  localStorage.removeItem("loginLockUntil");
}

// LOGIN
function login(e){
  e.preventDefault();

  if(isLockedOut()){
    const mins = getRemainingLockMinutes();
    log("warn", "Login attempt while locked out", { remainingMinutes: mins });
    document.getElementById("msg").innerText = `Too many failed attempts. Try again in ${mins} minute(s).`;
    return;
  }

  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  let savedPass = localStorage.getItem("adminPass") || DEFAULT_PASS;

  if(u === DEFAULT_USER && p === savedPass){
    clearFailedAttempts();
    localStorage.setItem("isAdmin","yes");
    log("info", "Login successful");

    let go = localStorage.getItem("redirectAfterLogin") || "admin";
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = go;

  } else {
    recordFailedAttempt();
    const remaining = MAX_ATTEMPTS - parseInt(localStorage.getItem("loginAttempts") || "0");
    document.getElementById("msg").innerText = remaining > 0
      ? `Invalid login. ${remaining} attempt(s) remaining.`
      : `Too many failed attempts. Locked for ${LOCKOUT_MINUTES} minutes.`;
  }
}

// 🔁 FORGOT PASSWORD
function forgot(){
  let code = prompt("Enter Secret Code");

  if(code !== SECRET_CODE){
    log("warn", "forgot: wrong secret code entered");
    alert("Wrong Secret Code ❌");
    return;
  }

  let newPass = prompt("Enter New Password");

  if(!newPass || newPass.length < 6){
    alert("Password must be at least 6 characters");
    return;
  }

  localStorage.setItem("adminPass", newPass);
  log("info", "forgot: password changed successfully");
  alert("✅ Password Changed Successfully");
}

</script>

</body>
</html>
